<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ACR Study">
<meta name="description" content="Spaced repetition study companion for The Ancient Covenant Record">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=OpenDyslexic:wght@400;700&display=swap" rel="stylesheet">
<title>ACR Study</title>
<link rel="stylesheet" href="study.css">
</head>
<body>

<div id="topnav">
  <button id="b-sb" title="Toggle sidebar" aria-label="Toggle sidebar">&#9776;</button>
  <button id="b-home" title="Home" aria-label="Home">&#8962;</button>
  <div id="tb" role="button" tabindex="0" title="Go to home screen">ACR Study</div>
  <div id="fc">
    <button id="b-fs-" title="Smaller text">A&#8722;</button>
    <button id="b-fs+" title="Larger text">A&#43;</button>
  </div>
  <button id="b-beeline" title="BeeLine reading aid">&#127752;</button>
  <button id="b-linefocus" title="Line focus mode">&#128065;</button>
  <button id="b-nt" title="Notes">&#128221;</button>
  <button id="b-nv" title="All notes">&#128196;</button>
  <button id="b-vt" title="Voice reader">&#128266;</button>
  <a href="../" class="lnk" title="Back to Reader">&#8592;<span class="hide-mobile">&nbsp;Reader</span></a>
</div>

<div id="sb"></div>

<div id="main">
  <div id="content">
    <div id="home">
      <div class="logo">&#x1F4D6;</div>
      <h1>ACR STUDY</h1>
      <p class="tag">
        Spaced repetition study companion<br>
        for The Ancient Covenant Record
      </p>
      <div class="btns">
        <button id="b-begin">Begin with Bereshit &#9654;</button>
        <button id="b-resume" style="display:none">Resume where I left off</button>
      </div>
      <p class="small">
        Phase 1 &middot; Shell + voice + notes<br>
        Data shared with the <a href="../">ACR Reader</a> on this device<br>
        Add to Home Screen from Safari for offline access
      </p>
    </div>
  </div>
</div>

<!-- Voice reader panel -->
<div id="vr">
  <button id="b-pl" title="Play">&#9654;</button>
  <button id="b-pa" style="display:none" title="Pause">&#9646;&#9646;</button>
  <button id="b-st" title="Stop">&#9632;</button>
  <select id="vs" title="Speed">
    <option value="0.7">0.7x</option>
    <option value="0.85">0.85x</option>
    <option value="1" selected>1x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
  </select>
  <select id="vc" title="Voice"><option value="">Loading…</option></select>
  <button id="b-pv" title="Preview voice">&#9654;&#9654;</button>
  <select id="vm" title="Mode">
    <option value="verses">Verses</option>
    <option value="notes">Notes</option>
    <option value="all">All</option>
  </select>
  <span id="vst">Ready</span>
</div>

<!-- Notes panel (per section) -->
<div id="np">
  <div id="np-head">
    <span id="np-lbl">Notes</span>
    <button id="np-save">&#10003; Save</button>
    <button id="np-clr">Clear</button>
    <button id="np-cls">&#10005;</button>
  </div>
  <textarea id="np-ta" placeholder="Write your notes for this section…"></textarea>
</div>

<!-- All-notes viewer -->
<div id="nv">
  <h2>&#128221; All Notes</h2>
  <div id="nv-list"></div>
</div>

<script src="study.js"></script>

</body>
</html>
