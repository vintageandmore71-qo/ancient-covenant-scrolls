<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ACR Study">
<meta name="description" content="Spaced repetition study companion for The Ancient Covenant Record">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=OpenDyslexic:wght@400;700&display=swap" rel="stylesheet">
<title>ACR Study</title>
<link rel="stylesheet" href="study.css">
</head>
<body>

<div id="topnav" role="navigation" aria-label="Main navigation">
  <button id="b-sb" title="Toggle sidebar" aria-label="Toggle sidebar" aria-expanded="false">&#9776;</button>
  <button id="b-home" title="Home" aria-label="Go to home screen">&#8962;</button>
  <div id="tb" role="button" tabindex="0" title="Go to home screen" aria-label="Current section title">ACR Study</div>
  <div id="fc" role="group" aria-label="Font size controls">
    <button id="b-fs-" title="Smaller text" aria-label="Decrease font size">A&#8722;</button>
    <button id="b-fs+" title="Larger text" aria-label="Increase font size">A&#43;</button>
  </div>
  <button id="b-theme" title="Theme: light / parchment / navy / amber" aria-label="Switch color theme">&#9680;</button>
  <button id="b-beeline" title="BeeLine reading aid" aria-label="Toggle BeeLine reading gradient">&#127752;</button>
  <button id="b-linefocus" title="Line focus mode" aria-label="Toggle line focus overlay">&#128065;</button>
  <button id="b-child" title="Child mode" aria-label="Toggle child mode with larger text">&#129490;</button>
  <button id="b-nt" title="Notes" aria-label="Open notes for this section">&#128221;</button>
  <button id="b-nv" title="All notes" aria-label="View all saved notes">&#128196;</button>
  <button id="b-vt" title="Voice reader" aria-label="Toggle voice reader panel">&#128266;</button>
  <a href="../" class="lnk" title="Back to Reader" aria-label="Return to ACR Reader">&#8592;<span class="hide-mobile">&nbsp;Reader</span></a>
</div>

<div id="sb" role="navigation" aria-label="Volume and section navigation"></div>

<div id="main" role="main">
  <div id="content" aria-live="polite" aria-atomic="false">
    <div id="home">
      <div class="logo">&#x1F4D6;</div>
      <h1>ACR STUDY</h1>
      <p class="tag">
        Spaced repetition study companion<br>
        for The Ancient Covenant Record
      </p>
      <div class="btns">
        <button id="b-begin">Begin with Bereshit &#9654;</button>
        <button id="b-resume" style="display:none">Resume where I left off</button>
      </div>
      <p class="small">
        Phase 1 &middot; Shell + voice + notes<br>
        Data shared with the <a href="../">ACR Reader</a> on this device<br>
        Add to Home Screen from Safari for offline access
      </p>
    </div>
  </div>
</div>

<!-- Voice reader panel -->
<div id="vr" role="region" aria-label="Voice reader controls">
  <button id="b-pl" title="Play" aria-label="Play voice reader">&#9654;</button>
  <button id="b-pa" style="display:none" title="Pause" aria-label="Pause voice reader">&#9646;&#9646;</button>
  <button id="b-st" title="Stop" aria-label="Stop voice reader">&#9632;</button>
  <select id="vs" title="Speed" aria-label="Reading speed">
    <option value="0.7">0.7x</option>
    <option value="0.85">0.85x</option>
    <option value="1" selected>1x</option>
    <option value="1.2">1.2x</option>
    <option value="1.5">1.5x</option>
  </select>
  <select id="vc" title="Voice" aria-label="Select voice"><option value="">Loading…</option></select>
  <button id="b-pv" title="Preview voice" aria-label="Preview selected voice">&#9654;&#9654;</button>
  <select id="vm" title="Mode" aria-label="Reading mode">
    <option value="verses">Verses</option>
    <option value="notes">Notes</option>
    <option value="all">All</option>
  </select>
  <span id="vst" role="status" aria-live="polite">Ready</span>
</div>

<!-- Notes panel (per section) -->
<div id="np" role="region" aria-label="Section notes">
  <div id="np-head">
    <span id="np-lbl">Notes</span>
    <button id="np-save" aria-label="Save notes">&#10003; Save</button>
    <button id="np-clr" aria-label="Clear notes">Clear</button>
    <button id="np-cls" aria-label="Close notes panel">&#10005;</button>
  </div>
  <textarea id="np-ta" placeholder="Write your notes for this section…" aria-label="Notes text area"></textarea>
</div>

<!-- All-notes viewer -->
<div id="nv" role="region" aria-label="All saved notes viewer">
  <h2>&#128221; All Notes</h2>
  <div id="nv-list"></div>
</div>

<script src="study.js"></script>

</body>
</html>
