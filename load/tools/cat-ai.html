<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Load &mdash; AI</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body { margin: 0; padding: 0; background: #0a0a0f; color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased; }
header.top { display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid #1f1f2f;
  position: sticky; top: 0; background: rgba(10,10,15,0.95);
  backdrop-filter: blur(8px); z-index: 5; }
header.top a.back, header.top a.help {
  color: #9ca3af; text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; border: 1px solid #2a2a42; }
header.top a.back:hover, header.top a.help:hover {
  color: #fff; border-color: #7c5cff; background: #1a1a2e; }
header.top h1 { margin: 0; font-size: 18px; flex: 1; font-weight: 700; }
main.body { max-width: 1100px; margin: 22px auto; padding: 0 20px 40px; }
.intro { color: #9ca3af; font-size: 14px; line-height: 1.6; margin: 0 0 18px; }
.tiles { display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.ws-tile { display: flex; flex-direction: column; align-items: flex-start;
  gap: 6px; padding: 14px 16px; background: #1a1a2e;
  border: 1px solid #2a2a42; border-radius: 10px; color: #e8e8f0;
  text-align: left; cursor: pointer; font: inherit; min-height: 96px; }
.ws-tile:active { transform: scale(0.97); }
.ws-tile:hover { border-color: #7c5cff; }
.ws-icon { color: #e8e8f0; }
.ws-icon svg { width: 22px; height: 22px; }
.ws-label { font-size: 15px; font-weight: 700; }
.ws-dir { font-size: 12px; color: #9ca3af; line-height: 1.5; }
.cats { display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.cat { display: flex; flex-direction: column; gap: 8px;
  padding: 22px 24px; background: #15152a; border: 1px solid #2a2a42;
  border-radius: 14px; color: #e8e8f0; text-decoration: none;
  min-height: 150px; }
.cat:hover { border-color: #7c5cff; background: #1a1a2e; }
.cat .cat-count { font-size: 11px; color: #7c5cff;
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.cat .cat-title { font-size: 20px; font-weight: 800; }
.cat .cat-desc { font-size: 13px; color: #9ca3af; line-height: 1.5; }
</style>
</head>
<body>
<header class="top"><a class="back" href="./index.html">&larr; Tools</a><h1>AI</h1><a class="help" href="./help.html">How it works</a></header><main class="body"><p class="intro">Prompts, styles, characters, provider status &mdash; every AI-flavored tool.</p><div class="tiles"><button class="ws-tile" onclick="window.location.href='./style-library.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="9" r="1.4" fill="currentColor"/><circle cx="14" cy="8" r="1.4" fill="currentColor"/><circle cx="16.5" cy="13" r="1.4" fill="currentColor"/><circle cx="9.5" cy="15" r="1.4" fill="currentColor"/></svg></span> <span class="ws-label">Style Library</span> <span class="ws-dir">50 curated AI-image styles across Cinema, Painted, Illustration, Photo, 3D, Genre, Crafty. Copy a single style or build a basket of multiple styles for one prompt.</span> </button>
<button class="ws-tile" onclick="window.location.href='./prompt-builder.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16v11H8l-4 4z"/><path d="M8 9h8M8 12h6"/></svg></span> <span class="ws-label">AI Prompt Builder</span> <span class="ws-dir">Compose a complete AI image prompt: subject + character lock + style + camera + lighting + composition + negatives. Pulls from Character Bible and the Style Library.</span> </button>
<button class="ws-tile" onclick="window.location.href='./character-bible.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span> <span class="ws-label">Character Bible</span> <span class="ws-dir">Lock face, wardrobe, voice, and personality across scenes. Reusable JSON profiles drop into Book-to-Video, LoadStudio, Verse-to-Video, or any AI prompt.</span> </button>
<button class="ws-tile" onclick="window.location.href='./verse-to-video.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M9 9h6M9 13h6M9 17h4"/><polygon points="20 11 24 14 20 17" fill="currentColor" stroke="none"/></svg></span> <span class="ws-label">Verse to Video</span> <span class="ws-dir">Paste a verse, lyric, or short passage. Tool breaks it into scene cards with visual prompts, camera, lighting, mood, and clip duration. Hooks into Character Bible + Style Library.</span> </button>
<button class="ws-tile" onclick="window.location.href='./ai-provider-status.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span> <span class="ws-label">AI Provider Status</span> <span class="ws-dir">Six explicit statuses per provider: Not configured, Ready, Failed, Rate limited, Unsupported request, Returned no file. No false-positive generation claims.</span> </button></div></main>
</body>
</html>
