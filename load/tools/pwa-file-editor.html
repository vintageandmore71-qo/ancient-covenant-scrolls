<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PWA File Editor &mdash; Load</title>
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<script src="../lib-jszip.min.js"></script>
<script src="../lib-export-receipt.js"></script>
<style>
:root{--bg:#0a0a14;--bg2:#141422;--bg3:#1f1f30;--fg:#e9e9f0;--mute:#9aa0b0;--accent:#7c3aed;--ok:#4ade80;--warn:#facc15;--err:#ff6e6e;--border:#2a2a40}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:linear-gradient(180deg,#150a28 0,#0a0514 100%);border-bottom:1px solid var(--border);flex-shrink:0}
header a.back{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.05)}
header h1{margin:0;font-size:16px;font-weight:800;flex:1}
.bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg);font-weight:700;font-size:12.5px;cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent)}
.btn.danger{border-color:rgba(255,110,110,.4);color:var(--err)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.dz{position:relative;border:2px dashed var(--border);background:#0a0e18;border-radius:12px;padding:18px 14px;text-align:center;color:var(--mute);margin:14px 16px}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz strong{display:block;font-size:14px;color:#fff}
.workspace{flex:1;display:grid;grid-template-columns:280px 1fr;min-height:0}
@media (max-width:760px){.workspace{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
.tree{background:var(--bg2);border-right:1px solid var(--border);overflow:auto;padding:12px}
.tree h3{margin:0 0 8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--mute)}
.node{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:12.5px;border-radius:6px;cursor:pointer}
.node:hover{background:var(--bg3)}
.node.active{background:rgba(124,58,237,.2);color:#fff}
.node .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node .sz{color:var(--mute);font-size:10.5px;font-variant-numeric:tabular-nums}
.node .badge{font-size:9.5px;padding:1px 5px;border-radius:8px;background:#2a2a3e;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.node .badge.bin{background:#5b6072}
.editor{display:flex;flex-direction:column;min-height:0}
.editor .toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2)}
.editor .path{flex:1;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.editor .body{flex:1;display:flex;min-height:0}
.editor textarea{flex:1;width:100%;background:#0a0e18;color:var(--fg);border:0;padding:14px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.55;resize:none;outline:none;tab-size:2}
.editor .preview{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:#0a0e18}
.editor .preview img,.editor .preview video,.editor .preview audio{max-width:100%;max-height:80vh;border-radius:8px;background:#000}
.empty{display:flex;flex:1;align-items:center;justify-content:center;color:var(--mute);font-size:13px;padding:20px;text-align:center}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a26;color:#fff;padding:10px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none}
.toast.on{display:block}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60}
.modal-back.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:420px;width:calc(100% - 32px)}
.modal h3{margin:0 0 10px;font-size:15px}
.modal input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:#0a0e18;color:var(--fg);font:inherit;font-size:13px;margin-bottom:10px}
.modal .row{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<header>
  <a class="back" href="../">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/></svg>
    Back to Load
  </a>
  <h1>PWA File Editor</h1>
  <a class="btn" href="./help.html#file-editor">How it works</a>
</header>

<div class="dz" id="dz">
  <input id="file" type="file" accept=".zip,application/zip">
  <strong>Drop a PWA ZIP or tap to pick</strong>
  Edit any text file inline. Replace any photo / audio / video. Repack and download. Original file is untouched.
</div>

<div class="bar" id="bar" style="display:none">
  <button class="btn primary" id="downloadZip">Download modified ZIP</button>
  <button class="btn" id="addFile">Add file</button>
  <button class="btn" id="newFolder">Add folder</button>
  <button class="btn danger" id="deleteFile" disabled>Delete current file</button>
  <span style="margin-left:auto;color:var(--mute);font-size:12px" id="meta"></span>
</div>

<div class="workspace" id="workspace" style="display:none">
  <div class="tree">
    <h3>Files</h3>
    <div id="treeList"></div>
  </div>
  <div class="editor">
    <div class="toolbar">
      <span class="path" id="curPath">No file selected</span>
      <button class="btn" id="replaceBtn" disabled>Replace</button>
      <button class="btn primary" id="saveBtn" disabled>Save</button>
    </div>
    <div class="body" id="editorBody">
      <div class="empty">Pick a file from the list to view or edit.</div>
    </div>
    <input id="replaceInput" type="file" style="display:none">
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="modal-back" id="modalAdd">
  <div class="modal">
    <h3>Add a new file</h3>
    <input id="addPath" placeholder="path/to/new-file.html">
    <input id="addContent" placeholder="optional starting text">
    <div class="row">
      <button class="btn" id="addCancel">Cancel</button>
      <button class="btn primary" id="addConfirm">Add</button>
    </div>
  </div>
</div>

<div class="modal-back" id="modalFolder">
  <div class="modal">
    <h3>Add a new folder</h3>
    <input id="folderPath" placeholder="path/to/folder/">
    <div class="row">
      <button class="btn" id="folderCancel">Cancel</button>
      <button class="btn primary" id="folderConfirm">Add</button>
    </div>
  </div>
</div>

<script>
(function(){
  if (!window.JSZip) { document.body.innerHTML = '<div style="padding:30px;color:#ff6e6e">JSZip failed to load.</div>'; return; }
  var $ = function(id){ return document.getElementById(id); };
  var toastEl = $('toast');
  function toast(m){ toastEl.textContent = m; toastEl.classList.add('on'); setTimeout(function(){ toastEl.classList.remove('on'); }, 1800); }

  function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function fmtBytes(n){ if (!n) return '0 B'; var u=['B','KB','MB','GB']; var i=0; while(n>=1024 && i<u.length-1){ n/=1024; i++; } return n.toFixed(i?1:0)+' '+u[i]; }
  function isText(name){ return /\.(html?|css|js|mjs|json|md|markdown|txt|xml|svg|webmanifest)$/i.test(name); }
  function isImage(name){ return /\.(png|jpe?g|webp|gif|svg|bmp|ico)$/i.test(name); }
  function isAudio(name){ return /\.(mp3|wav|ogg|m4a|aac)$/i.test(name); }
  function isVideo(name){ return /\.(mp4|webm|mov|m4v|ogv)$/i.test(name); }
  function downloadBlob(blob, name){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  var zip = null;
  var origName = 'project.zip';
  var fileMap = {};   // path -> { dirty: bool, text: string|null, blob: Blob|null, isText: bool, size: number }
  var current = null; // path

  async function loadZip(file){
    origName = file.name || 'project.zip';
    try { zip = await window.JSZip.loadAsync(file); }
    catch(e){ toast('Not a valid ZIP: ' + e.message); return; }
    fileMap = {};
    var paths = Object.keys(zip.files).filter(function(p){ return !zip.files[p].dir; });
    for (var i = 0; i < paths.length; i++) {
      var p = paths[i];
      var entry = zip.files[p];
      var sz = (entry._data && entry._data.uncompressedSize) || 0;
      fileMap[p] = { dirty: false, text: null, blob: null, isText: isText(p), size: sz };
    }
    renderTree();
    $('workspace').style.display = '';
    $('bar').style.display = '';
    $('meta').textContent = paths.length + ' file(s) loaded from ' + origName;
    current = null;
    renderEditor();
  }

  function sortPaths(paths){
    return paths.slice().sort(function(a,b){
      var aDepth = (a.match(/\//g)||[]).length;
      var bDepth = (b.match(/\//g)||[]).length;
      if (aDepth !== bDepth) return aDepth - bDepth;
      return a.localeCompare(b);
    });
  }

  function renderTree(){
    var host = $('treeList');
    var paths = sortPaths(Object.keys(fileMap));
    host.innerHTML = paths.map(function(p){
      var f = fileMap[p];
      var badge = f.isText ? '' : '<span class="badge bin">bin</span>';
      var dirty = f.dirty ? '<span class="badge" style="background:#7c3aed">edited</span>' : '';
      return '<div class="node' + (p===current?' active':'') + '" data-path="' + escapeHtml(p) + '">' +
        '<span class="nm" title="' + escapeHtml(p) + '">' + escapeHtml(p) + '</span>' +
        dirty + badge +
        '<span class="sz">' + fmtBytes(f.size) + '</span>' +
        '</div>';
    }).join('');
  }

  $('treeList').addEventListener('click', async function(e){
    var node = e.target.closest('.node');
    if (!node) return;
    var p = node.getAttribute('data-path');
    await openPath(p);
  });

  async function openPath(p){
    current = p;
    var f = fileMap[p];
    if (!f) return;
    if (f.isText && f.text == null) {
      try { f.text = await zip.files[p].async('string'); }
      catch(e){ f.text = '[unable to read: ' + e.message + ']'; }
    } else if (!f.isText && f.blob == null) {
      try { f.blob = await zip.files[p].async('blob'); }
      catch(e){ f.blob = null; }
    }
    renderTree();
    renderEditor();
  }

  function renderEditor(){
    var body = $('editorBody');
    var pathEl = $('curPath');
    var save = $('saveBtn');
    var rep = $('replaceBtn');
    var del = $('deleteFile');
    if (!current) {
      pathEl.textContent = 'No file selected';
      body.innerHTML = '<div class="empty">Pick a file from the list to view or edit.</div>';
      save.disabled = true; rep.disabled = true; del.disabled = true;
      return;
    }
    var f = fileMap[current];
    pathEl.textContent = current;
    del.disabled = false;
    if (f.isText) {
      body.innerHTML = '<textarea id="ta" spellcheck="false"></textarea>';
      $('ta').value = f.text || '';
      save.disabled = false; rep.disabled = true;
      $('ta').addEventListener('input', function(){ f.dirty = true; });
    } else {
      var name = current.toLowerCase();
      var html = '<div class="preview">';
      var url = f.blob ? URL.createObjectURL(f.blob) : '';
      if (isImage(name)) html += '<img src="' + url + '" alt="">';
      else if (isAudio(name)) html += '<audio controls src="' + url + '"></audio>';
      else if (isVideo(name)) html += '<video controls playsinline src="' + url + '"></video>';
      else html += '<div style="color:var(--mute)">Binary file. Use Replace to swap it.</div>';
      html += '</div>';
      body.innerHTML = html;
      save.disabled = true; rep.disabled = false;
    }
  }

  $('saveBtn').addEventListener('click', function(){
    if (!current) return;
    var f = fileMap[current];
    if (!f.isText) return;
    var ta = $('ta'); if (!ta) return;
    f.text = ta.value;
    f.dirty = true;
    f.size = new Blob([f.text]).size;
    renderTree();
    toast('Saved in memory. Tap Download ZIP to keep.');
  });

  $('replaceBtn').addEventListener('click', function(){
    if (!current) return;
    $('replaceInput').click();
  });
  $('replaceInput').addEventListener('change', function(e){
    var nf = e.target.files && e.target.files[0]; if (!nf || !current) return;
    var f = fileMap[current];
    f.blob = nf;
    f.size = nf.size;
    f.dirty = true;
    f.isText = false;
    renderTree();
    renderEditor();
    toast('Replaced. Tap Download ZIP to keep.');
    e.target.value = '';
  });

  $('deleteFile').addEventListener('click', function(){
    if (!current) return;
    if (!confirm('Delete ' + current + ' from this ZIP?')) return;
    delete fileMap[current];
    current = null;
    renderTree(); renderEditor();
    toast('File removed. Tap Download ZIP to keep.');
  });

  function showModal(id){ $(id).classList.add('on'); }
  function hideModal(id){ $(id).classList.remove('on'); }
  $('addFile').addEventListener('click', function(){ $('addPath').value=''; $('addContent').value=''; showModal('modalAdd'); $('addPath').focus(); });
  $('addCancel').addEventListener('click', function(){ hideModal('modalAdd'); });
  $('addConfirm').addEventListener('click', function(){
    var p = $('addPath').value.trim();
    if (!p) return;
    if (fileMap[p]) { toast('That path already exists.'); return; }
    var content = $('addContent').value;
    fileMap[p] = { dirty: true, text: content, blob: null, isText: isText(p), size: new Blob([content]).size };
    hideModal('modalAdd');
    current = p; renderTree(); renderEditor();
    toast('File added.');
  });
  $('newFolder').addEventListener('click', function(){ $('folderPath').value=''; showModal('modalFolder'); $('folderPath').focus(); });
  $('folderCancel').addEventListener('click', function(){ hideModal('modalFolder'); });
  $('folderConfirm').addEventListener('click', function(){
    var p = $('folderPath').value.trim();
    if (!p) return;
    if (!/\/$/.test(p)) p = p + '/';
    var keep = p + '.keep';
    if (fileMap[keep]) { toast('Folder already exists.'); return; }
    fileMap[keep] = { dirty: true, text: '', blob: null, isText: true, size: 0 };
    hideModal('modalFolder');
    renderTree();
    toast('Folder added (.keep marker).');
  });

  $('downloadZip').addEventListener('click', async function(){
    if (!zip) return;
    var out = new window.JSZip();
    var paths = Object.keys(fileMap);
    for (var i = 0; i < paths.length; i++) {
      var p = paths[i];
      var f = fileMap[p];
      if (f.isText) {
        if (f.text == null) f.text = await zip.files[p].async('string').catch(function(){ return ''; });
        out.file(p, f.text);
      } else {
        if (f.blob == null) f.blob = await zip.files[p].async('blob').catch(function(){ return new Blob([]); });
        out.file(p, f.blob);
      }
    }
    var blob = await out.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    var newName = origName.replace(/\.zip$/i, '') + '-edited.zip';
    downloadBlob(blob, newName);
    if (window.LoadReceipt) {
      var dirty = paths.filter(function(p){ return fileMap[p].dirty; });
      var rcpt = window.LoadReceipt.create({
        exportType: 'PWA File Editor',
        fileName: newName,
        fileSize: blob.size,
        includedFiles: paths,
        warnings: dirty.length ? ['Edited ' + dirty.length + ' file(s): ' + dirty.slice(0,20).join(', ')] : [],
        manifestStatus: paths.indexOf('manifest.json') >= 0 ? 'PASS' : 'NOT TESTED',
        serviceWorkerStatus: paths.indexOf('service-worker.js') >= 0 ? 'PASS' : 'NOT TESTED',
        rightsStatus: paths.indexOf('rights.json') >= 0 ? 'PASS' : 'NOT TESTED',
        offlineStatus: paths.indexOf('service-worker.js') >= 0 ? 'PASS' : 'NOT TESTED',
        safetyStatus: 'NOT TESTED',
        nextAction: 'Run the modified ZIP through Safety & Rights or the Book PWA Validator before publishing.'
      });
      window.LoadReceipt.save(rcpt);
    }
    toast('ZIP downloaded + receipt saved.');
  });

  $('file').addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0]; if (!f) return;
    loadZip(f);
  });
})();
</script>
</body>
</html>
