<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Load &mdash; Build &amp; validate</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body { margin: 0; padding: 0; background: #0a0a0f; color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased; }
header.top { display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid #1f1f2f;
  position: sticky; top: 0; background: rgba(10,10,15,0.95);
  backdrop-filter: blur(8px); z-index: 5; }
header.top a.back, header.top a.help {
  color: #9ca3af; text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; border: 1px solid #2a2a42; }
header.top a.back:hover, header.top a.help:hover {
  color: #fff; border-color: #7c5cff; background: #1a1a2e; }
header.top h1 { margin: 0; font-size: 18px; flex: 1; font-weight: 700; }
main.body { max-width: 1100px; margin: 22px auto; padding: 0 20px 40px; }
.intro { color: #9ca3af; font-size: 14px; line-height: 1.6; margin: 0 0 18px; }
.tiles { display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.ws-tile { display: flex; flex-direction: column; align-items: flex-start;
  gap: 6px; padding: 14px 16px; background: #1a1a2e;
  border: 1px solid #2a2a42; border-radius: 10px; color: #e8e8f0;
  text-align: left; cursor: pointer; font: inherit; min-height: 96px; }
.ws-tile:active { transform: scale(0.97); }
.ws-tile:hover { border-color: #7c5cff; }
.ws-icon { color: #e8e8f0; }
.ws-icon svg { width: 22px; height: 22px; }
.ws-label { font-size: 15px; font-weight: 700; }
.ws-dir { font-size: 12px; color: #9ca3af; line-height: 1.5; }
.cats { display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.cat { display: flex; flex-direction: column; gap: 8px;
  padding: 22px 24px; background: #15152a; border: 1px solid #2a2a42;
  border-radius: 14px; color: #e8e8f0; text-decoration: none;
  min-height: 150px; }
.cat:hover { border-color: #7c5cff; background: #1a1a2e; }
.cat .cat-count { font-size: 11px; color: #7c5cff;
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.cat .cat-title { font-size: 20px; font-weight: 800; }
.cat .cat-desc { font-size: 13px; color: #9ca3af; line-height: 1.5; }
</style>
</head>
<body>
<header class="top"><a class="back" href="./index.html">&larr; Workspace Tools</a><h1>Build &amp; validate</h1><a class="help" href="./help.html">How it works</a></header><main class="body"><p class="intro">PWA builders, validators, safety scans, diagnostics, samples.</p><div class="tiles"><button class="ws-tile" onclick="window.location.href='./pwa-builder.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg></span> <span class="ws-label">One-Click PWA Builder</span> <span class="ws-dir">Type a project, tap one button, get a complete installable PWA ZIP with manifest + service worker + icons + safety scan + receipt.</span> </button>
<button class="ws-tile" onclick="window.location.href='./pwa-file-editor.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 3h11l4 4v14H5z"/><path d="M9 3v6h7V3"/><path d="M8 13h8M8 17h6"/></svg></span> <span class="ws-label">PWA File Editor</span> <span class="ws-dir">Drop any PWA ZIP. Edit text files inline, replace photos / audio / video, add or delete files, repack and download. Original file is untouched.</span> </button>
<button class="ws-tile" onclick="window.location.href='./feature-tests.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span> <span class="ws-label">Diagnostics</span> <span class="ws-dir">43 verifications across the workspace. PASS / FAIL / WARN with timestamps + JSON export.</span> </button>
<button class="ws-tile" onclick="window.location.href='./loadstudio-validator.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6z"/><polyline points="9 12 11.5 14.5 16 10"/></svg></span> <span class="ws-label">LoadStudio Validator</span> <span class="ws-dir">Inspect <code>.loadstudio.zip</code> / <code>.cinepwa.zip</code>. Confirms required files, folders, rights metadata + safety.</span> </button>
<button class="ws-tile" onclick="window.location.href='./book-pwa-validator.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/><path d="M9 12l2 2 4-5"/></svg></span> <span class="ws-label">Book PWA Validator</span> <span class="ws-dir">Confirm an exported book PWA opens as a real app (not raw code): required files, chapters, cover image, manifest, service worker, asset paths.</span> </button>
<button class="ws-tile" onclick="window.location.href='./safety-rights.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6z"/><path d="M9 12l2.2 2.2L15 10.5"/></svg></span> <span class="ws-label">Safety &amp; Rights</span> <span class="ws-dir">Drop any HTML or ZIP. Scans for credentials, external scripts, path traversal, and checks rights metadata. Sandboxed preview.</span> </button>
<button class="ws-tile" onclick="window.location.href='./acceptance.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3 7-7"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span> <span class="ws-label">Acceptance Criteria</span> <span class="ws-dir">23 acceptance checks from Build Plan Part 13. Auto-run the file/URL/code checks, manually mark the on-iPad steps, export the final pass/fail report.</span> </button>
<button class="ws-tile" onclick="window.location.href='./samples.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 4v5M14 4v5"/></svg></span> <span class="ws-label">Sample Test Projects</span> <span class="ws-dir">Nine ready-made files (HTML, PWA ZIP, EPUB, PDF, image, audio, video, LoadStudio pack, book PWA) for fast import + tool testing.</span> </button>
<button class="ws-tile" onclick="window.location.href='./color-contrast.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor"/></svg></span> <span class="ws-label">Color Contrast Checker</span> <span class="ws-dir">WCAG 2.1 AA / AAA contrast ratio between any two colors. Pass / fail badges + auto-suggest a passing foreground.</span> </button>
<button class="ws-tile" onclick="window.location.href='./piper-resilience.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M9 21h6"/></svg></span> <span class="ws-label">Voice Diagnostics</span> <span class="ws-dir">Test Piper voice + browser voice in four steps. Reset settings, clear corrupt config, rebuild voice cache, hard reset.</span> </button>
<button class="ws-tile" onclick="window.location.href='./regex-tester.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/><circle cx="6" cy="18" r="1.5"/><path d="M16 4l-2 2"/><path d="M14 4l2 2"/></svg></span> <span class="ws-label">Regex Tester</span> <span class="ws-dir">Test a regular expression against sample text. Live highlight, capture groups, replacement preview, common-pattern presets. Pairs with Find &amp; Replace.</span> </button>
<button class="ws-tile" onclick="window.location.href='./diff-viewer.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h7v16H4z"/><path d="M13 4h7v16h-7z"/><path d="M6 10h3M6 14h3"/><path d="M15 8h3M15 12h3M15 16h3"/></svg></span> <span class="ws-label">Diff Viewer</span> <span class="ws-dir">Paste old vs. new text. Line-level diff with additions, removals, and unchanged. Ignore whitespace, ignore case, hide unchanged. Useful after Find &amp; Replace.</span> </button>
<button class="ws-tile" onclick="window.location.href='./json-formatter.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H6a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h2"/><path d="M16 3h2a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-2"/></svg></span> <span class="ws-label">JSON Formatter</span> <span class="ws-dir">Validate, pretty-print (2 / 4 spaces / tab), or minify any JSON. Sort keys, line/column error pointer, file load, copy, download. Stats: bytes, objects, arrays, keys.</span> </button>
<button class="ws-tile" onclick="window.location.href='./checksum.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6z"/><path d="M9 12l2.2 2.2L15 10.5"/></svg></span> <span class="ws-label">Checksum</span> <span class="ws-dir">Drop any file or paste text. Get SHA-1 / SHA-256 / SHA-384 / SHA-512 hashes. Verify a published hash against the file you actually have. Useful for asset integrity.</span> </button>
<button class="ws-tile" onclick="window.location.href='./text-encoder.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span> <span class="ws-label">Text Encoder</span> <span class="ws-dir">Encode and decode across five formats: Base64, URL, HTML entities, hex, and slugify. Two-way for the first four; live convert as you type.</span> </button>
<button class="ws-tile" onclick="window.location.href='./csv-viewer.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 4v16M15 4v16"/></svg></span> <span class="ws-label">CSV Viewer</span> <span class="ws-dir">Drop or paste CSV / TSV. Sortable, searchable table view. Auto-delimiter detect, quoted fields, header row toggle. Export filtered rows as CSV / JSON or copy as a Markdown table.</span> </button>
<button class="ws-tile" onclick="window.location.href='./pwa-icons.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span> <span class="ws-label">PWA Icon Set</span> <span class="ws-dir">Drop one square image, get every standard PWA / iOS / Android icon size in a ZIP. Optional rounded corners, background fill, maskable variants. Includes a manifest icons array snippet.</span> </button>
<button class="ws-tile" onclick="window.location.href='./lorem-ipsum.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 10h16M4 14h12M4 18h8"/></svg></span> <span class="ws-label">Lorem Ipsum</span> <span class="ws-dir">Generate placeholder text in five flavors (Latin, English, Hipster, Pirate, Verse). Pick paragraphs / sentences / words. Useful for layout testing and UI mocks.</span> </button></div></main>
</body>
</html>
