* { box-sizing: border-box; }

  -webkit-font-smoothing: antialiased; }
header.top { display: flex; align-items: center; gap: 12px;

  position: sticky; top: 0; background: rgba(10,10,15,0.95);
  backdrop-filter: blur(8px); z-index: 5; }
header.top a.back, header.top a.help {
  color: #9ca3af; text-decoration: none; font-size: 13px;

.ws-tile { display: flex; flex-direction: column; align-items: flex-start;

.cat { display: flex; flex-direction: column; gap: 8px;

<header class="top"><a class="back" href="./index.html">&larr; Workspace Tools</a><h1>Books &amp; writing</h1><a class="help" href="./help.html">How it works</a></header><main class="body"><p class="intro">Manuscripts, EPUB, covers, Markdown, reading-level, focus reading.</p><div class="tiles"><button class="ws-tile" onclick="window.location.href='./manuscript-to-book.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/><path d="M8 11h8M8 14h8M8 17h5"/><polyline points="20 17 23 20 20 23" /></svg></span> <span class="ws-label">Manuscript to Book PWA</span> <span class="ws-dir">Drop a TXT / Markdown / HTML manuscript. Auto-detects chapters and produces a complete installable book PWA ZIP with cover, manifest, service worker, sidebar nav.</span> </button>
<button class="ws-tile" onclick="window.location.href='./epub-builder.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5a2 2 0 0 1 2-2h11l3 3v15H6a2 2 0 0 1-2-2z"/><path d="M17 3v4h3"/><path d="M8 11h7M8 14h7M8 17h5"/></svg></span> <span class="ws-label">EPUB Builder</span> <span class="ws-dir">Drop a manuscript or paste text. Auto-detects chapters, builds a valid EPUB 3 file with cover, table of contents, and metadata. Saves an export receipt.</span> </button>
<button class="ws-tile" onclick="window.location.href='./cover-designer.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 3h14v18H5z"/><path d="M5 3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg></span> <span class="ws-label">Cover Designer</span> <span class="ws-dir">KDP / eBook / Audible / Square book covers with title, subtitle, author, optional image, gradient or solid background, ornament corners.</span> </button>
<button class="ws-tile" onclick="window.location.href='./markdown-preview.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="1.5"/><path d="M7 10v5l2-3 2 3v-5"/><path d="M14 10v5"/><path d="M14 13l2-3 2 3"/></svg></span> <span class="ws-label">Markdown Preview</span> <span class="ws-dir">Live two-pane Markdown editor. Headings, bold, italic, code, lists, blockquotes, tables, images, links. Export to HTML or .md.</span> </button>
<button class="ws-tile" onclick="window.location.href='./find-replace.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="6"/><path d="M14.5 14.5L20 20"/><path d="M7 10h6M10 7v6"/></svg></span> <span class="ws-label">Find &amp; Replace</span> <span class="ws-dir">Bulk find-and-replace across a manuscript. Multiple rules, case sensitivity, whole-word, regex, common-typo presets. Live diff preview, undo, export.</span> </button>
<button class="ws-tile" onclick="window.location.href='./reading-level.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/><path d="M8 11h6M8 14h8M8 17h5"/></svg></span> <span class="ws-label">Reading Level Analyzer</span> <span class="ws-dir">Word count, sentence length, syllables, Flesch Reading Ease, Flesch-Kincaid grade level, and the ten hardest sentences highlighted.</span> </button>
<button class="ws-tile" onclick="window.location.href='./speed-reader.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12h16"/><path d="M11 8l-3 4 3 4"/><path d="M13 8l3 4-3 4"/></svg></span> <span class="ws-label">Speed Reader</span> <span class="ws-dir">Rapid Serial Visual Presentation: one word at a time at adjustable WPM, pivot-letter focus, pause on punctuation. Dyslexia-friendly.</span> </button>
<button class="ws-tile" onclick="window.location.href='./sentence-reader.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M8 9h8M8 12h8M8 15h5"/></svg></span> <span class="ws-label">Sentence Reader</span> <span class="ws-dir">Paste a passage, the tool splits it into one-sentence cards with big text, background tints, and per-sentence read-aloud. Atkinson Hyperlegible default.</span> </button>
<button class="ws-tile" onclick="window.location.href='./chapter-splitter.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h6v16H5z"/><path d="M13 4h6v16h-6z"/><path d="M11 12h2"/></svg></span> <span class="ws-label">Chapter Splitter</span> <span class="ws-dir">Drop a manuscript. Detect chapters by Markdown heading, &quot;Chapter N&quot; line, ALL-CAPS, or blank-line gap. Bundle each chapter as its own .md or .txt inside a ZIP.</span> </button>
<button class="ws-tile" onclick="window.location.href='./word-frequency.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="14" width="3" height="6"/><rect x="9" y="9" width="3" height="11"/><rect x="15" y="4" width="3" height="16"/></svg></span> <span class="ws-label">Word Frequency</span> <span class="ws-dir">Top words used in a manuscript with counts and percentages. Stop-word filter, minimum length, click any word to highlight it in the source. Export CSV or JSON.</span> </button>
<button class="ws-tile" onclick="window.location.href='./html-to-markdown.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/><path d="M8 11l2 2 4-4"/><path d="M8 17h8"/></svg></span> <span class="ws-label">HTML to Markdown</span> <span class="ws-dir">Drop or paste HTML. Get clean Markdown out: headings, paragraphs, bold, italic, links, images, lists, blockquotes, code, tables. Useful when extracting from a webpage or web export.</span> </button>
<button class="ws-tile" onclick="window.location.href='./markdown-toc.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h4M3 12h4M3 18h4"/><path d="M9 6h12M9 12h10M9 18h8"/></svg></span> <span class="ws-label">Markdown TOC</span> <span class="ws-dir">Drop a Markdown manuscript. Generate a Table of Contents with GitHub-style anchor links. Choose levels, list style, indent, numbering. Insert at top of source or copy.</span> </button></div></main>
