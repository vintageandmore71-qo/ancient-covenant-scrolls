<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cover Designer &mdash; Load</title>
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Atkinson+Hyperlegible:wght@400;700&family=Cinzel:wght@500;700;900&family=Bebas+Neue&display=swap">
<style>
:root{--bg:#0a0a14;--bg2:#141422;--bg3:#1f1f30;--fg:#e9e9f0;--mute:#9aa0b0;--accent:#7c3aed;--ok:#4ade80;--warn:#facc15;--err:#ff6e6e;--border:#2a2a40}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 18px;background:linear-gradient(180deg,#150a28 0,#0a0514 100%);border-bottom:1px solid var(--border)}
header a.back{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.05)}
header h1{margin:0;font-size:16px;font-weight:800;flex:1}
.layout{display:grid;grid-template-columns:340px 1fr;gap:14px;max-width:1400px;margin:14px auto;padding:0 14px 80px}
@media (max-width:920px){.layout{grid-template-columns:1fr}}
.controls{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 90px);overflow:auto}
.controls h3{margin:8px 0 0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mute)}
label{display:block;font-size:11.5px;color:var(--mute);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:#0a0e18;color:var(--fg);font:inherit;font-size:13px}
textarea{min-height:60px;resize:vertical;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg);font-weight:700;font-size:13px;cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent)}
.btn.danger{border-color:rgba(255,110,110,.4);color:var(--err)}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.stage{position:relative;background:#000;border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:14px}
canvas#cover{display:block;max-width:100%;max-height:calc(100vh - 140px);background:#000;box-shadow:0 8px 30px rgba(0,0,0,.6);border-radius:6px}
.toggleRow{display:flex;align-items:center;gap:8px;font-size:13px}
.toggleRow input[type=checkbox]{width:16px;height:16px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a26;color:#fff;padding:10px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;font-family:'Inter',sans-serif}
.toast.on{display:block}
</style>
</head>
<body>
<header>
  <a class="back" href="../">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/></svg>
    Back to Load
  </a>
  <h1>Cover Designer</h1>
  <a class="back" href="./help.html#cover" title="How it works">How it works</a>
</header>
<div class="layout">

<div class="controls">
  <h3>Text</h3>
  <div><label>Title</label><textarea id="title">My Book Title</textarea></div>
  <div><label>Subtitle (optional)</label><input id="subtitle" placeholder="A subtitle"></div>
  <div><label>Author</label><input id="author" value="Author Name"></div>
  <div><label>Series / banner (optional)</label><input id="series" placeholder="e.g. Volume 1"></div>

  <h3>Format</h3>
  <div class="row">
    <div><label>Preset</label>
      <select id="preset">
        <option value="kdp" selected>KDP 6x9 (1600x2400)</option>
        <option value="kdptrade">KDP 5x8 (1500x2400)</option>
        <option value="square">Square 2000</option>
        <option value="ebook">eBook 1600x2560</option>
        <option value="audiobook">Audible 3000x3000</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div><label>Custom (W x H)</label><input id="custom" placeholder="1600x2400"></div>
  </div>

  <h3>Background</h3>
  <div class="row">
    <div><label>Mode</label>
      <select id="bgMode">
        <option value="gradient" selected>Gradient</option>
        <option value="solid">Solid color</option>
        <option value="image">Image</option>
      </select>
    </div>
    <div><label>Solid color</label><input id="bgColor" type="color" value="#1f1147"></div>
  </div>
  <div class="row">
    <div><label>Gradient A</label><input id="gA" type="color" value="#1f1147"></div>
    <div><label>Gradient B</label><input id="gB" type="color" value="#7c3aed"></div>
  </div>
  <div><label>Image (optional)</label><input id="bgImage" type="file" accept="image/*"></div>
  <div class="row">
    <div><label>Image dim</label><input id="dim" type="range" min="0" max="80" value="40"></div>
    <div><label>Vignette</label><input id="vignette" type="range" min="0" max="80" value="35"></div>
  </div>

  <h3>Title style</h3>
  <div class="row">
    <div><label>Font</label>
      <select id="titleFont">
        <option value="'Cinzel',serif" selected>Cinzel (classical)</option>
        <option value="'Playfair Display',serif">Playfair</option>
        <option value="'Bebas Neue',sans-serif">Bebas Neue</option>
        <option value="'Atkinson Hyperlegible',sans-serif">Atkinson</option>
        <option value="Inter,sans-serif">Inter</option>
        <option value="Georgia,serif">Georgia</option>
      </select>
    </div>
    <div><label>Title color</label><input id="titleColor" type="color" value="#ffffff"></div>
  </div>
  <div class="row">
    <div><label>Title size</label><input id="titleSize" type="range" min="60" max="200" value="120"></div>
    <div><label>Italic</label><select id="titleItal"><option value="normal">Off</option><option value="italic">On</option></select></div>
  </div>
  <div class="row">
    <div><label>Author color</label><input id="authorColor" type="color" value="#fde68a"></div>
    <div><label>Author size</label><input id="authorSize" type="range" min="30" max="100" value="50"></div>
  </div>
  <div class="row">
    <div><label>Title position</label>
      <select id="titlePos"><option value="top">Top</option><option value="center" selected>Center</option><option value="bottom">Bottom</option></select>
    </div>
    <div><label>Author position</label>
      <select id="authorPos"><option value="top">Top</option><option value="center">Center</option><option value="bottom" selected>Bottom</option></select>
    </div>
  </div>

  <h3>Frame</h3>
  <div class="row">
    <div><label>Border style</label>
      <select id="border"><option value="none">None</option><option value="thin" selected>Thin</option><option value="double">Double</option><option value="ornament">Ornament corners</option></select>
    </div>
    <div><label>Border color</label><input id="borderColor" type="color" value="#fde68a"></div>
  </div>

  <h3>Export</h3>
  <div class="row">
    <div><label>Format</label>
      <select id="outFmt"><option value="image/jpeg" selected>JPEG</option><option value="image/png">PNG</option><option value="image/webp">WEBP</option></select>
    </div>
    <div><label>Quality</label><input id="q" type="range" min="80" max="100" value="95"></div>
  </div>
  <div class="bar">
    <button class="btn primary" id="dl">Download cover</button>
    <button class="btn" id="copyBtn">Copy image</button>
    <button class="btn danger" id="reset">Reset</button>
  </div>
</div>

<div class="stage"><canvas id="cover" width="1600" height="2400"></canvas></div>

</div>
<div id="toast" class="toast"></div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var toastEl = $('toast');
  function toast(m){ toastEl.textContent = m; toastEl.classList.add('on'); setTimeout(function(){ toastEl.classList.remove('on'); }, 1800); }
  function downloadBlob(blob, name){ var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100); }

  var bgImg = null;

  function setSize(){
    var p = $('preset').value;
    var W, H;
    if (p === 'kdp') { W = 1600; H = 2400; }
    else if (p === 'kdptrade') { W = 1500; H = 2400; }
    else if (p === 'square') { W = 2000; H = 2000; }
    else if (p === 'ebook') { W = 1600; H = 2560; }
    else if (p === 'audiobook') { W = 3000; H = 3000; }
    else {
      var m = ($('custom').value || '1600x2400').match(/(\d+)\s*[xX*]\s*(\d+)/);
      W = m ? parseInt(m[1],10) : 1600;
      H = m ? parseInt(m[2],10) : 2400;
    }
    $('cover').width = Math.max(200, Math.min(6000, W));
    $('cover').height = Math.max(200, Math.min(6000, H));
  }

  function wrap(ctx, text, x, y, maxW, lineH, anchor){
    var lines = [];
    text.split(/\n/).forEach(function(para){
      if (!para.trim()) { lines.push(''); return; }
      var words = para.split(/\s+/);
      var line = '';
      for (var i = 0; i < words.length; i++) {
        var test = line ? line + ' ' + words[i] : words[i];
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = words[i]; }
        else line = test;
      }
      if (line) lines.push(line);
    });
    var totalH = lines.length * lineH;
    var startY = y;
    if (anchor === 'center') startY = y - totalH/2 + lineH/2;
    else if (anchor === 'bottom') startY = y - totalH + lineH;
    lines.forEach(function(l, i){ ctx.fillText(l, x, startY + i*lineH); });
    return totalH;
  }

  function render(){
    setSize();
    var c = $('cover');
    var ctx = c.getContext('2d');
    var W = c.width, H = c.height;
    ctx.clearRect(0,0,W,H);
    var mode = $('bgMode').value;
    if (mode === 'solid') { ctx.fillStyle = $('bgColor').value; ctx.fillRect(0,0,W,H); }
    else if (mode === 'gradient') {
      var g = ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0, $('gA').value);
      g.addColorStop(1, $('gB').value);
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    }
    else {
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
      if (bgImg) {
        var ratio = Math.max(W/bgImg.naturalWidth, H/bgImg.naturalHeight);
        var iw = bgImg.naturalWidth*ratio, ih = bgImg.naturalHeight*ratio;
        ctx.drawImage(bgImg, (W-iw)/2, (H-ih)/2, iw, ih);
      }
      var dim = parseInt($('dim').value,10) / 100;
      if (dim > 0) { ctx.fillStyle = 'rgba(0,0,0,'+dim+')'; ctx.fillRect(0,0,W,H); }
    }
    var vig = parseInt($('vignette').value,10) / 100;
    if (vig > 0) {
      var rg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)/3,W/2,H/2,Math.max(W,H)/1.1);
      rg.addColorStop(0,'rgba(0,0,0,0)');
      rg.addColorStop(1,'rgba(0,0,0,'+vig+')');
      ctx.fillStyle = rg; ctx.fillRect(0,0,W,H);
    }

    // Series banner near top
    var series = $('series').value.trim();
    if (series) {
      ctx.font = '700 ' + Math.round(W*0.022) + 'px Inter,sans-serif';
      ctx.fillStyle = $('borderColor').value;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(series.toUpperCase(), W/2, H * 0.05);
    }

    // Title
    var titleFont = $('titleFont').value;
    var titleSize = parseInt($('titleSize').value,10);
    var titleItal = $('titleItal').value;
    ctx.fillStyle = $('titleColor').value;
    ctx.font = titleItal + ' 800 ' + titleSize + 'px ' + titleFont;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.55)';
    ctx.shadowBlur = 30;
    var titlePos = $('titlePos').value;
    var titleY = titlePos === 'top' ? H * 0.20 : titlePos === 'bottom' ? H * 0.68 : H/2 - H * 0.05;
    var titleH = wrap(ctx, $('title').value || '', W/2, titleY, W * 0.86, titleSize * 1.18, 'center');

    // Subtitle just under title
    var sub = $('subtitle').value.trim();
    if (sub) {
      ctx.font = 'italic 500 ' + Math.round(titleSize * 0.42) + 'px ' + titleFont;
      ctx.fillStyle = $('titleColor').value;
      ctx.shadowBlur = 10;
      wrap(ctx, sub, W/2, titleY + titleH/2 + titleSize * 0.4, W * 0.78, titleSize * 0.55, 'center');
    }
    ctx.shadowBlur = 0;

    // Author
    var authorPos = $('authorPos').value;
    var authorY = authorPos === 'top' ? H * 0.10 : authorPos === 'center' ? H/2 + H * 0.16 : H * 0.92;
    ctx.fillStyle = $('authorColor').value;
    ctx.font = '700 ' + ($('authorSize').value) + 'px ' + titleFont;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(($('author').value || '').toUpperCase(), W/2, authorY);

    // Border
    var bSty = $('border').value;
    if (bSty !== 'none') {
      ctx.strokeStyle = $('borderColor').value;
      ctx.lineWidth = Math.max(2, W * 0.004);
      var pad = Math.round(W * 0.04);
      if (bSty === 'thin') {
        ctx.strokeRect(pad, pad, W-pad*2, H-pad*2);
      } else if (bSty === 'double') {
        ctx.strokeRect(pad, pad, W-pad*2, H-pad*2);
        ctx.lineWidth = Math.max(1, W * 0.002);
        ctx.strokeRect(pad + ctx.lineWidth*4, pad + ctx.lineWidth*4, W - (pad + ctx.lineWidth*4)*2, H - (pad + ctx.lineWidth*4)*2);
      } else if (bSty === 'ornament') {
        // Four L-shaped corner brackets
        var cl = Math.round(W * 0.06);
        function corner(x, y, sx, sy){
          ctx.beginPath();
          ctx.moveTo(x, y + sy*cl);
          ctx.lineTo(x, y);
          ctx.lineTo(x + sx*cl, y);
          ctx.stroke();
        }
        ctx.lineWidth = Math.max(3, W * 0.005);
        corner(pad, pad, 1, 1);
        corner(W-pad, pad, -1, 1);
        corner(pad, H-pad, 1, -1);
        corner(W-pad, H-pad, -1, -1);
      }
    }
  }

  ['title','subtitle','author','series','preset','custom','bgMode','bgColor','gA','gB','dim','vignette','titleFont','titleColor','titleSize','titleItal','authorColor','authorSize','titlePos','authorPos','border','borderColor'].forEach(function(id){
    var el = $(id);
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });
  $('bgImage').addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var img = new Image();
    img.onload = function(){ bgImg = img; $('bgMode').value = 'image'; render(); };
    img.src = URL.createObjectURL(f);
  });

  $('dl').addEventListener('click', function(){
    var fmt = $('outFmt').value;
    var q = parseInt($('q').value,10) / 100;
    $('cover').toBlob(function(blob){
      if (!blob) { toast('Export failed.'); return; }
      var ext = fmt === 'image/png' ? 'png' : fmt === 'image/webp' ? 'webp' : 'jpg';
      var safeTitle = ($('title').value || 'cover').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40) || 'cover';
      downloadBlob(blob, safeTitle + '-cover-' + $('cover').width + 'x' + $('cover').height + '.' + ext);
    }, fmt, q);
  });
  $('copyBtn').addEventListener('click', function(){
    if (!navigator.clipboard || !window.ClipboardItem) { toast('Clipboard image API unavailable.'); return; }
    $('cover').toBlob(function(blob){
      if (!blob) { toast('Capture failed.'); return; }
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function(){ toast('Copied PNG.'); }).catch(function(e){ toast('Copy blocked: ' + e.message); });
    }, 'image/png');
  });
  $('reset').addEventListener('click', function(){
    bgImg = null;
    $('title').value = 'My Book Title';
    $('subtitle').value = '';
    $('author').value = 'Author Name';
    $('series').value = '';
    $('preset').value = 'kdp';
    $('bgMode').value = 'gradient';
    $('gA').value = '#1f1147'; $('gB').value = '#7c3aed';
    $('dim').value = 40; $('vignette').value = 35;
    $('titleFont').value = "'Cinzel',serif";
    $('titleColor').value = '#ffffff';
    $('titleSize').value = 120;
    $('titleItal').value = 'normal';
    $('authorColor').value = '#fde68a';
    $('authorSize').value = 50;
    $('titlePos').value = 'center';
    $('authorPos').value = 'bottom';
    $('border').value = 'thin';
    $('borderColor').value = '#fde68a';
    render();
  });

  render();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(render);
})();
</script>
</body>
</html>
