<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Markdown Preview &mdash; Load</title>
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<style>
:root{--bg:#0a0a14;--bg2:#141422;--bg3:#1f1f30;--fg:#e9e9f0;--mute:#9aa0b0;--accent:#7c3aed;--ok:#4ade80;--warn:#facc15;--err:#ff6e6e;--border:#2a2a40}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:linear-gradient(180deg,#150a28 0,#0a0514 100%);border-bottom:1px solid var(--border);flex-shrink:0}
header a.back{color:var(--fg);text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-weight:600;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.05)}
header h1{margin:0;font-size:16px;font-weight:800;flex:1}
.bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg);font-weight:700;font-size:12.5px;cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent)}
.btn.danger{border-color:rgba(255,110,110,.4);color:var(--err)}
.workspace{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
@media (max-width:760px){.workspace{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
.col{display:flex;flex-direction:column;min-height:0}
.col.preview{border-left:1px solid var(--border)}
.col h3{margin:0;padding:10px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);background:var(--bg2);border-bottom:1px solid var(--border)}
textarea#md{flex:1;width:100%;padding:18px 22px;background:#0a0e18;color:var(--fg);border:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.65;resize:none;outline:none}
.render{flex:1;padding:20px 26px;overflow:auto;font-family:'Atkinson Hyperlegible',sans-serif;font-size:15px;line-height:1.7;background:#0a0e18}
.render h1,.render h2,.render h3,.render h4{font-family:'Inter',sans-serif;color:#fff;margin:1.4em 0 .5em}
.render h1{font-size:28px;border-bottom:1px solid var(--border);padding-bottom:8px}
.render h2{font-size:22px}
.render h3{font-size:18px}
.render h4{font-size:15px;font-weight:700}
.render p{margin:0 0 .9em;color:#e0e0eb}
.render code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:.92em}
.render pre{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;overflow:auto;font-size:12.5px;line-height:1.55}
.render pre code{background:transparent;padding:0;border-radius:0}
.render ul,.render ol{margin:0 0 .9em;padding-left:24px}
.render li{margin-bottom:4px}
.render blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:0 0 1em;color:var(--mute);font-style:italic}
.render a{color:var(--accent);text-decoration:underline}
.render hr{border:0;border-top:1px solid var(--border);margin:1.4em 0}
.render img{max-width:100%;border-radius:6px;display:block;margin:.7em 0}
.render table{border-collapse:collapse;margin:0 0 1em}
.render th,.render td{border:1px solid var(--border);padding:6px 10px;font-size:13px}
.render th{background:var(--bg2);font-weight:700}
.render strong{color:#fff}
.render em{color:#e9e9f0}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a26;color:#fff;padding:10px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none}
.toast.on{display:block}
.dz{position:relative;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px dashed var(--border);background:#0a0e18;cursor:pointer;font-size:12px;color:var(--mute);font-weight:600}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
</style>
</head>
<body>
<header>
  <a class="back" href="../">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/></svg>
    Back to Load
  </a>
  <h1>Markdown Preview</h1>
  <a class="back" href="./help.html#markdown" title="How it works">How it works</a>
</header>

<div class="bar">
  <span class="dz"><input id="file" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="width:14px;height:14px"><path d="M12 16V4"/><polyline points="6 10 12 4 18 10"/></svg> Load .md file</span>
  <button class="btn primary" id="downloadHtml">Download HTML</button>
  <button class="btn" id="copyHtml">Copy HTML</button>
  <button class="btn" id="downloadMd">Download Markdown</button>
  <button class="btn danger" id="clearBtn">Clear</button>
  <span style="margin-left:auto;color:var(--mute);font-size:12px" id="info">Type Markdown on the left, render on the right.</span>
</div>

<div class="workspace">
  <div class="col">
    <h3>Markdown source</h3>
    <textarea id="md" spellcheck="false"># Hello, Markdown

Type Markdown on the **left**, see the rendered HTML on the *right*.

## Features

- Headings, **bold**, *italic*, `code`
- [Links](https://example.com)
- Lists, blockquotes, code blocks
- Tables

> Inspirational quote here.

```js
function hi(name) {
  return "Hello, " + name + "!";
}
```

| Column A | Column B |
| -------- | -------- |
| Cell 1   | Cell 2   |
| Cell 3   | Cell 4   |

---

That's the whole flavour.
</textarea>
  </div>
  <div class="col preview">
    <h3>Rendered preview</h3>
    <div class="render" id="render"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var toastEl = $('toast');
  function toast(m){ toastEl.textContent = m; toastEl.classList.add('on'); setTimeout(function(){ toastEl.classList.remove('on'); }, 1800); }
  function downloadBlob(blob, name){ var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100); }

  function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Inline rules (run on each line / table cell). Order matters.
  function inline(s){
    s = s.replace(/`([^`]+)`/g, function(_, c){ return '<code>' + escapeHtml(c) + '</code>'; });
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g, function(_, alt, url, t){
      return '<img src="' + escapeAttr(url) + '" alt="' + escapeAttr(alt) + '"' + (t ? ' title="' + escapeAttr(t) + '"' : '') + '>';
    });
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g, function(_, txt, url, t){
      return '<a href="' + escapeAttr(url) + '" target="_blank" rel="noopener"' + (t ? ' title="' + escapeAttr(t) + '"' : '') + '>' + inline(txt) + '</a>';
    });
    s = s.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^\*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
    s = s.replace(/(^|[^_])_([^_\n]+?)_(?!_)/g, '$1<em>$2</em>');
    s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    return s;
  }
  function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render(md){
    var lines = md.replace(/\r\n?/g,'\n').split('\n');
    var out = [];
    var i = 0;
    function flushList(stack){
      while (stack.length) { out.push(stack.pop().tag === 'ol' ? '</ol>' : '</ul>'); }
    }
    while (i < lines.length) {
      var line = lines[i];
      // Code fence
      if (/^\s*```/.test(line)) {
        var lang = line.replace(/^\s*```\s*/, '').trim();
        var buf = [];
        i++;
        while (i < lines.length && !/^\s*```/.test(lines[i])) { buf.push(lines[i]); i++; }
        i++;
        out.push('<pre><code' + (lang ? ' class="lang-' + escapeAttr(lang) + '"' : '') + '>' + escapeHtml(buf.join('\n')) + '</code></pre>');
        continue;
      }
      // Horizontal rule
      if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) { out.push('<hr>'); i++; continue; }
      // Heading
      var hm = line.match(/^(#{1,6})\s+(.+?)\s*#*$/);
      if (hm) { out.push('<h' + hm[1].length + '>' + inline(escapeHtml(hm[2])) + '</h' + hm[1].length + '>'); i++; continue; }
      // Setext heading
      if (i + 1 < lines.length && /^=+\s*$/.test(lines[i+1]) && line.trim()) { out.push('<h1>' + inline(escapeHtml(line)) + '</h1>'); i += 2; continue; }
      if (i + 1 < lines.length && /^-+\s*$/.test(lines[i+1]) && line.trim()) { out.push('<h2>' + inline(escapeHtml(line)) + '</h2>'); i += 2; continue; }
      // Blockquote
      if (/^\s*>/.test(line)) {
        var qbuf = [];
        while (i < lines.length && /^\s*>/.test(lines[i])) { qbuf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
        out.push('<blockquote>' + render(qbuf.join('\n')) + '</blockquote>');
        continue;
      }
      // Table
      if (/\|/.test(line) && i + 1 < lines.length && /^\s*\|?\s*[:\-\| ]+\|/.test(lines[i+1])) {
        var head = line.split('|').map(function(c){ return c.trim(); }).filter(function(c, idx, arr){ return !(c === '' && (idx === 0 || idx === arr.length-1)); });
        var sep = lines[i+1];
        var aligns = sep.split('|').map(function(c){ return c.trim(); }).filter(Boolean).map(function(s){
          if (/^:-+:$/.test(s)) return 'center';
          if (/^-+:$/.test(s)) return 'right';
          if (/^:-+$/.test(s)) return 'left';
          return '';
        });
        var rows = [];
        i += 2;
        while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim()) {
          rows.push(lines[i].split('|').map(function(c){ return c.trim(); }).filter(function(c, idx, arr){ return !(c === '' && (idx === 0 || idx === arr.length-1)); }));
          i++;
        }
        var th = head.map(function(c, idx){ return '<th' + (aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '') + '>' + inline(escapeHtml(c)) + '</th>'; }).join('');
        var trs = rows.map(function(r){
          return '<tr>' + r.map(function(c, idx){ return '<td' + (aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '') + '>' + inline(escapeHtml(c)) + '</td>'; }).join('') + '</tr>';
        }).join('');
        out.push('<table><thead><tr>' + th + '</tr></thead><tbody>' + trs + '</tbody></table>');
        continue;
      }
      // List (bulleted or ordered)
      if (/^\s*([-*+]|\d+\.)\s+/.test(line)) {
        var ordered = /^\s*\d+\./.test(line);
        out.push(ordered ? '<ol>' : '<ul>');
        while (i < lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])) {
          var content = lines[i].replace(/^\s*([-*+]|\d+\.)\s+/, '');
          out.push('<li>' + inline(escapeHtml(content)) + '</li>');
          i++;
          if (i < lines.length && !lines[i].trim()) { i++; if (!/^\s*([-*+]|\d+\.)\s+/.test(lines[i] || '')) break; }
        }
        out.push(ordered ? '</ol>' : '</ul>');
        continue;
      }
      // Empty line: paragraph break
      if (!line.trim()) { i++; continue; }
      // Paragraph: gather contiguous non-blank lines
      var pbuf = [];
      while (i < lines.length && lines[i].trim() && !/^\s*(#{1,6}\s|>|\s*```|\s*[-*+]\s|\s*\d+\.\s)/.test(lines[i])) {
        pbuf.push(lines[i]); i++;
      }
      out.push('<p>' + inline(escapeHtml(pbuf.join(' '))) + '</p>');
    }
    return out.join('\n');
  }

  function update(){
    var html = render($('md').value);
    $('render').innerHTML = html;
    var words = ($('md').value.match(/\S+/g) || []).length;
    $('info').textContent = words + ' words &middot; ' + html.length.toLocaleString() + ' bytes of HTML';
  }
  $('md').addEventListener('input', update);
  update();

  $('downloadHtml').addEventListener('click', function(){
    var inner = render($('md').value);
    var doc = '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Markdown</title><style>body{max-width:760px;margin:30px auto;padding:0 20px;font:16px/1.65 -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;color:#222}h1,h2,h3,h4{color:#101820}code{background:#f0f0f5;padding:2px 6px;border-radius:4px;font-family:ui-monospace,Menlo,Consolas,monospace}pre{background:#f0f0f5;padding:12px;border-radius:6px;overflow:auto}blockquote{border-left:3px solid #7c3aed;padding:6px 14px;color:#555;font-style:italic}table{border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px 10px}img{max-width:100%}</style></head><body>' + inner + '</body></html>';
    downloadBlob(new Blob([doc], { type:'text/html' }), 'markdown-' + new Date().toISOString().slice(0,10) + '.html');
  });
  $('copyHtml').addEventListener('click', function(){
    var t = render($('md').value);
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(function(){ toast('HTML copied.'); });
    else toast('Clipboard unavailable.');
  });
  $('downloadMd').addEventListener('click', function(){
    downloadBlob(new Blob([$('md').value], { type:'text/markdown' }), 'markdown-' + new Date().toISOString().slice(0,10) + '.md');
  });
  $('clearBtn').addEventListener('click', function(){ $('md').value = ''; update(); });
  $('file').addEventListener('change', function(e){
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev){ $('md').value = ev.target.result; update(); };
    r.readAsText(f);
    e.target.value = '';
  });
})();
</script>
</body>
</html>
