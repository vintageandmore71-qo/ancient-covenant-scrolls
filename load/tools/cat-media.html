<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Load &mdash; Media</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body { margin: 0; padding: 0; background: #0a0a0f; color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased; }
header.top { display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid #1f1f2f;
  position: sticky; top: 0; background: rgba(10,10,15,0.95);
  backdrop-filter: blur(8px); z-index: 5; }
header.top a.back, header.top a.help {
  color: #9ca3af; text-decoration: none; font-size: 13px;
  padding: 6px 10px; border-radius: 6px; border: 1px solid #2a2a42; }
header.top a.back:hover, header.top a.help:hover {
  color: #fff; border-color: #7c5cff; background: #1a1a2e; }
header.top h1 { margin: 0; font-size: 18px; flex: 1; font-weight: 700; }
main.body { max-width: 1100px; margin: 22px auto; padding: 0 20px 40px; }
.intro { color: #9ca3af; font-size: 14px; line-height: 1.6; margin: 0 0 18px; }
.tiles { display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.ws-tile { display: flex; flex-direction: column; align-items: flex-start;
  gap: 6px; padding: 14px 16px; background: #1a1a2e;
  border: 1px solid #2a2a42; border-radius: 10px; color: #e8e8f0;
  text-align: left; cursor: pointer; font: inherit; min-height: 96px; }
.ws-tile:active { transform: scale(0.97); }
.ws-tile:hover { border-color: #7c5cff; }
.ws-icon { color: #e8e8f0; }
.ws-icon svg { width: 22px; height: 22px; }
.ws-label { font-size: 15px; font-weight: 700; }
.ws-dir { font-size: 12px; color: #9ca3af; line-height: 1.5; }
.cats { display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.cat { display: flex; flex-direction: column; gap: 8px;
  padding: 22px 24px; background: #15152a; border: 1px solid #2a2a42;
  border-radius: 14px; color: #e8e8f0; text-decoration: none;
  min-height: 150px; }
.cat:hover { border-color: #7c5cff; background: #1a1a2e; }
.cat .cat-count { font-size: 11px; color: #7c5cff;
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.cat .cat-title { font-size: 20px; font-weight: 800; }
.cat .cat-desc { font-size: 13px; color: #9ca3af; line-height: 1.5; }
</style>
</head>
<body>
<header class="top"><a class="back" href="./index.html">&larr; Workspace Tools</a><h1>Media</h1><a class="help" href="./help.html">How it works</a></header><main class="body"><p class="intro">Photos, audio, video, voice, masks, palettes &mdash; anything that touches a media file.</p><div class="tiles"><button class="ws-tile" onclick="window.location.href='./voice-recorder.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/><path d="M9 21h6"/></svg></span> <span class="ws-label">Voice Recorder</span> <span class="ws-dir">Record narration takes with a live level meter. Per-take playback, rename, download. WAV / WebM / OGG / M4A depending on browser. Files never leave the device.</span> </button>
<button class="ws-tile" onclick="window.location.href='./audio-trim.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h2l2-7 4 14 3-9 3 4h4"/></svg></span> <span class="ws-label">Audio Trim</span> <span class="ws-dir">Drop a recording or any audio file. Drag handles to pick exact start + end seconds. Add fade in/out. Export as universal WAV.</span> </button>
<button class="ws-tile" onclick="window.location.href='./tts-voiceover.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 9v6h3l5 4V5L8 9H5z"/><path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14"/><circle cx="20" cy="12" r="1.5" fill="currentColor"/></svg></span> <span class="ws-label">TTS Voiceover</span> <span class="ws-dir">Browser text-to-speech captured to an audio file. Pick voice, rate, pitch. Saves as WebM / WAV. Useful for narration without your own voice.</span> </button>
<button class="ws-tile" onclick="window.location.href='./image-resize.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="1.5"/><path d="M8 8h8v8H8z"/><path d="M4 4l4 4M20 4l-4 4M4 20l4-4M20 20l-4-4"/></svg></span> <span class="ws-label">Image Resize &amp; Crop</span> <span class="ws-dir">Drop an image. Resize to a preset (square, portrait, story, landscape, KDP cover, PWA icon) or custom WxH. Cover / Fit / Stretch. PNG / JPEG / WEBP.</span> </button>
<button class="ws-tile" onclick="window.location.href='./image-upscaler.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="1.5"/><path d="M9 12l3-3 3 3M12 9v6"/></svg></span> <span class="ws-label">Image Upscaler</span> <span class="ws-dir">Drop an image, pick 2x / 3x / 4x, get a sharper higher-resolution PNG / WEBP / JPEG with optional sharpening pass. Offline-first; handoff guide to AI Spaces included.</span> </button>
<button class="ws-tile" onclick="window.location.href='./mask-editor.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M9 10c1.5-1 3-1 4.5 0s3 1 4.5 0"/><circle cx="9" cy="10" r="1" fill="currentColor"/></svg></span> <span class="ws-label">Mask Editor</span> <span class="ws-dir">Drop a photo. Paint a white mask over the area you want AI to change. Brush + erase + undo + invert + clear. Exports a clean black/white PNG ready for inpaint.</span> </button>
<button class="ws-tile" onclick="window.location.href='./palette-extractor.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="9" r="1.6" fill="currentColor"/><circle cx="14" cy="8" r="1.6" fill="currentColor"/><circle cx="16.5" cy="13" r="1.6" fill="currentColor"/><circle cx="9.5" cy="15" r="1.6" fill="currentColor"/></svg></span> <span class="ws-label">Palette Extractor</span> <span class="ws-dir">Drop a cover or photo. Get the eight most-prevalent colors plus a ready-to-paste manifest theme_color and CSS palette block.</span> </button>
<button class="ws-tile" onclick="window.location.href='./reel-composer.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="13" height="12" rx="1.5"/><path d="M16 10l5-3v10l-5-3"/><polygon points="8 9 13 12 8 15" fill="currentColor" stroke="none"/></svg></span> <span class="ws-label">Reel Composer</span> <span class="ws-dir">Scene-cards JSON + per-scene image + per-scene audio -> one WebM video. Ken-Burns motion, verse text overlay, mood-based gradient fallbacks.</span> </button>
<button class="ws-tile" onclick="window.location.href='./subtitle-generator.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 12h10M7 15h6"/></svg></span> <span class="ws-label">Subtitle Generator</span> <span class="ws-dir">Lines or scene-cards JSON in, timed SRT + WebVTT out. Three timing modes: fixed seconds, words per minute, or per-cue durations.</span> </button>
<button class="ws-tile" onclick="window.location.href='./quote-card.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M8 8c0 0 1 0 1 2c0 1-1 1-1 1M14 8c0 0 1 0 1 2c0 1-1 1-1 1"/><path d="M8 15h8"/></svg></span> <span class="ws-label">Quote Card Generator</span> <span class="ws-dir">Verse + background image or gradient + dyslexia-friendly fonts -> shareable PNG / JPEG / WEBP. Square, portrait, story, landscape, header sizes.</span> </button>
<button class="ws-tile" onclick="window.location.href='./image-filter.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="9" r="4"/><circle cx="16" cy="15" r="4"/><path d="M11 12l3 0"/></svg></span> <span class="ws-label">Image Filter</span> <span class="ws-dir">Drop an image, slide brightness, contrast, saturation, hue, blur, sepia, grayscale, invert. Nine presets (B&amp;W, sepia, warm, cool, vintage, &hellip;). Export PNG / JPEG / WEBP.</span> </button>
<button class="ws-tile" onclick="window.location.href='./palette-generator.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="8.5" cy="9" r="1.4" fill="currentColor"/><circle cx="15.5" cy="9" r="1.4" fill="currentColor"/><circle cx="6" cy="14" r="1.4" fill="currentColor"/><circle cx="18" cy="14" r="1.4" fill="currentColor"/><circle cx="12" cy="16.5" r="1.4" fill="currentColor"/></svg></span> <span class="ws-label">Palette Generator</span> <span class="ws-dir">Pick a base color, get six harmony schemes (monochromatic, analogous, complementary, split-complementary, triadic, tetradic). Tap any swatch to copy hex. Export CSS or JSON.</span> </button>
<button class="ws-tile" onclick="window.location.href='./image-compare.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="1.5"/><path d="M12 4v16"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg></span> <span class="ws-label">Image Compare</span> <span class="ws-dir">Drop A and B. Slide a handle to wipe between the two, or pick side-by-side, or pixel-difference overlay. Useful for before/after of upscale, mask, filter, or AI generation.</span> </button>
<button class="ws-tile" onclick="window.location.href='./audio-concat.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span> <span class="ws-label">Audio Concat</span> <span class="ws-dir">Drop multiple audio files (WAV / MP3 / M4A / OGG / WEBM). Reorder, add silence between, fade in/out. Export one continuous 16-bit PCM WAV.</span> </button>
<button class="ws-tile" onclick="window.location.href='./audio-normalize.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3l2-7 4 14 3-9 3 4h3"/></svg></span> <span class="ws-label">Audio Normalize</span> <span class="ws-dir">Drop an audio file. Tool measures peak and RMS, scales to a target dBFS so quiet recordings get loud and hot recordings tame. Optional soft-clip ceiling. Export 16-bit WAV.</span> </button>
<button class="ws-tile" onclick="window.location.href='./color-blindness.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></svg></span> <span class="ws-label">Color Blindness Simulator</span> <span class="ws-dir">Drop an image, see how it looks for protanopia, deuteranopia, tritanopia, and achromatopsia. Severity slider, side-by-side preview, per-simulation PNG export. Useful for cover art and chart accessibility.</span> </button>
<button class="ws-tile" onclick="window.location.href='./audio-waveform.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12h2l3-7 4 14 4-12 4 8 5-3"/></svg></span> <span class="ws-label">Audio Waveform</span> <span class="ws-dir">Drop audio, render its waveform as a static PNG. Pick size, foreground / background colors, padding, bar count, and style (bars, line, mirror, filled). Useful for podcast covers and video thumbnails.</span> </button>
<button class="ws-tile" onclick="window.location.href='./image-metadata.html'"> <span class="ws-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><circle cx="8" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/><circle cx="17" cy="6" r="2"/></svg></span> <span class="ws-label">Image Metadata</span> <span class="ws-dir">Drop an image, see dimensions, format, color depth, EXIF (camera, date, exposure, ISO, focal length), GPS coordinates. One-tap strip-metadata exports a clean copy.</span> </button></div></main>
</body>
</html>
