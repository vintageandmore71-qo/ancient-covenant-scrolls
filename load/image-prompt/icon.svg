<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Image Prompt">
  <defs>
    <linearGradient id="ipBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1a1a3e"/>
      <stop offset="55%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#3a1860"/>
    </linearGradient>
    <linearGradient id="ipAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#9c9cff"/>
      <stop offset="100%" stop-color="#5a5ae0"/>
    </linearGradient>
    <radialGradient id="ipSun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- Rounded background tile -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#ipBg)"/>
  <!-- Outer frame: chat bubble that doubles as image frame, tail at bottom-left -->
  <path d="M120 110 h272 a40 40 0 0 1 40 40 v200 a40 40 0 0 1 -40 40 h-150 l-72 60 v-60 h-50 a40 40 0 0 1 -40 -40 v-200 a40 40 0 0 1 40 -40 z"
        fill="none" stroke="url(#ipAccent)" stroke-width="14" stroke-linejoin="round"/>
  <!-- Mountain landscape inside -->
  <path d="M150 320 l60 -80 l50 38 l72 -100 l72 90"
        fill="none" stroke="url(#ipAccent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sun -->
  <circle cx="195" cy="195" r="22" fill="url(#ipSun)"/>
  <!-- Sparkle top-right -->
  <path d="M380 165 l8 24 l24 8 l-24 8 l-8 24 l-8 -24 l-24 -8 l24 -8 z" fill="#fde68a"/>
  <!-- Smaller sparkle bottom inside -->
  <path d="M295 360 l4 12 l12 4 l-12 4 l-4 12 l-4 -12 l-12 -4 l12 -4 z" fill="#9c9cff"/>
</svg>
