<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Covenant Record">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>The Ancient Covenant Record</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--fg:#111111;--nav-bg:#222222;--sb-bg:#2a2a2a;
  --sb-fg:#aaaaaa;--border:#888888;--accent:#444444;
  --note-bg:rgba(0,0,0,.03);--hl-sel:rgba(255,235,59,.5);
}
body{font-family:Arial,sans-serif;font-size:10.5pt;background:var(--bg);color:var(--fg);line-height:1.65;transition:background .2s,color .2s;-webkit-text-size-adjust:100%}
body.dark{--bg:#1a1a1a;--fg:#e8e8e0;--nav-bg:#111;--sb-bg:#1e1e1e;--sb-fg:#888;--note-bg:rgba(255,255,255,.03)}
body.sepia{--bg:#f4ecd8;--fg:#3b2a1a;--nav-bg:#3b2a1a;--sb-bg:#2e2014}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:var(–bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#auth-screen h1{font-size:15px;color:var(–fg);letter-spacing:.05em;text-align:center;line-height:1.5}
#auth-screen input{border:1px solid #888;border-radius:6px;padding:10px 14px;font-size:15px;background:var(–bg);color:var(–fg);width:240px;text-align:center}
#auth-screen button{background:#333;color:#ddd;border:none;border-radius:6px;padding:10px 32px;font-size:14px;cursor:pointer}
#auth-err{color:#c00;font-size:13px;display:none}
#auth-icon{font-size:48px;margin-bottom:4px}

/* LAYOUT */
#prog{position:fixed;top:0;left:0;right:0;height:3px;background:transparent;z-index:10000}
#prog-fill{height:3px;background:#666;width:0%;transition:width .1s}
#topnav{position:fixed;top:3px;left:0;right:0;height:46px;background:var(–nav-bg);display:flex;align-items:center;gap:4px;padding:0 8px;z-index:1000;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.nb{background:none;border:none;color:#ccc;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;font-family:Arial;white-space:nowrap;flex-shrink:0}
.nb:hover,.nb.active{background:#444;color:#fff}
#title-bar{flex:1;color:#888;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;padding:0 4px}
#search-box{background:#333;border:1px solid #555;border-radius:4px;color:#ddd;padding:3px 7px;font-size:12px;width:120px;font-family:Arial}
#search-box::placeholder{color:#777}

#sidebar{position:fixed;top:49px;left:0;bottom:49px;width:270px;background:var(–sb-bg);overflow-y:auto;z-index:900;transition:transform .25s}
#sidebar.hidden{transform:translateX(-270px)}
.toc-sec{padding:9px 12px 4px;color:#777;font-size:8.5px;font-weight:bold;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #363636;margin-top:4px}
.toc-vol{padding:5px 12px 2px;color:#999;font-size:10.5px;font-weight:bold}
.toc-file{padding:3px 12px 3px 24px;color:var(–sb-fg);font-size:10.5px;cursor:pointer;border-radius:2px}
.toc-file:hover,.toc-file.active{background:#383838;color:#fff}
.toc-file.active{border-left:2px solid #888;padding-left:22px}

#main{margin-left:270px;margin-top:49px;margin-bottom:49px;padding:24px 40px 60px;max-width:860px;transition:margin-left .25s}
#main.no-sb{margin-left:0}
@media(max-width:700px){
#main{margin-left:0;padding:14px 14px 60px}
#sidebar{transform:translateX(-270px)}
#sidebar.mob-open{transform:translateX(0)}
}

#content p{font-family:Arial,sans-serif;line-height:var(–lh,1.65);margin:.1em 0}
#content .dp{font-size:var(–fs,10.5pt)}

/* HIGHLIGHTS */
.hl-y{background:#ffeb3b;border-radius:2px}
.hl-g{background:#90EE90;border-radius:2px}
.hl-b{background:#87CEEB;border-radius:2px}
.hl-p{background:#DDA0DD;border-radius:2px}
.hl-o{background:#FFB347;border-radius:2px}
body.dark .hl-y{background:#7a6000;color:#fff}
body.dark .hl-g{background:#2d5a2d;color:#fff}
body.dark .hl-b{background:#1a4a6b;color:#fff}
body.dark .hl-p{background:#5a2d6b;color:#fff}
body.dark .hl-o{background:#7a3a00;color:#fff}

/* HIGHLIGHT POPUP */
#hl-popup{position:fixed;background:#222;border-radius:8px;padding:6px 8px;display:none;gap:6px;z-index:5000;box-shadow:0 4px 12px rgba(0,0,0,.4)}
#hl-popup.show{display:flex}
.hl-btn{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.3);cursor:pointer}
.hl-rm{background:#555;color:#ddd;font-size:12px;border:none;border-radius:4px;padding:2px 6px;cursor:pointer}

/* SEARCH HIGHLIGHT */
mark{background:#ffeb3b;border-radius:2px}
body.dark mark{background:#7a6000;color:#fff}

/* BOTTOM NAV */
#botnav{position:fixed;bottom:0;left:270px;right:0;height:49px;background:var(–nav-bg);display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:1000;transition:left .25s}
#botnav.no-sb{left:0}
.bnav-btn{background:#444;color:#ddd;padding:5px 12px;border-radius:4px;font-size:12px;font-family:Arial;border:none;cursor:pointer;text-decoration:none}
.bnav-btn:hover{background:#666;color:#fff}
.bnav-btn.off{opacity:.3;pointer-events:none}
#pos-lbl{color:#888;font-size:11px;flex:1;text-align:center}

/* TOP BUTTON */
#top-btn{position:fixed;bottom:58px;right:12px;background:#444;color:#ddd;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:none;z-index:1001;box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* NOTES PANEL */
#notes-panel{position:fixed;top:49px;right:0;width:300px;bottom:49px;background:var(–sb-bg);border-left:1px solid #444;z-index:800;transform:translateX(300px);transition:transform .25s;display:flex;flex-direction:column}
#notes-panel.open{transform:translateX(0)}
#notes-header{padding:10px 12px;border-bottom:1px solid #444;color:#aaa;font-size:11px;display:flex;justify-content:space-between;align-items:center}
#notes-ta{flex:1;background:transparent;border:none;color:var(–fg);font-size:11px;font-family:Arial;padding:12px;resize:none;line-height:1.6;outline:none}
#notes-ta::placeholder{color:#666}

/* NOTES VIEWER */
#notes-viewer{position:fixed;inset:49px 0 49px;background:var(–sb-bg);z-index:850;overflow-y:auto;display:none;padding:16px}
#notes-viewer.open{display:block}
.nv-entry{background:rgba(255,255,255,.04);border-radius:6px;padding:10px 14px;margin-bottom:10px;cursor:pointer;border-left:3px solid #666}
.nv-entry:hover{background:rgba(255,255,255,.08)}
.nv-title{color:#aaa;font-size:10px;margin-bottom:5px}
.nv-text{color:var(–fg);font-size:11px;line-height:1.5;white-space:pre-wrap}

/* RECENTLY READ */
#recent-panel{position:fixed;top:49px;left:270px;right:0;background:var(–nav-bg);z-index:700;display:none;padding:12px;border-bottom:1px solid #444}
#recent-panel.open{display:flex;flex-wrap:wrap;gap:8px}
.rp-item{background:#333;color:#ccc;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}
.rp-item:hover{background:#555;color:#fff}

/* BOOKMARKS */
#bm-panel{position:fixed;top:49px;left:270px;right:0;background:var(–nav-bg);z-index:700;display:none;padding:12px;border-bottom:1px solid #444}
#bm-panel.open{display:flex;flex-wrap:wrap;gap:8px}
.bm-item{background:#444;color:#ccc;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;display:flex;gap:6px;align-items:center}
.bm-item .bm-rm{color:#888;cursor:pointer;font-size:10px}

/* VOICE BAR */
#voice-bar{position:fixed;bottom:49px;left:270px;right:0;background:#1a1a2e;border-top:1px solid #333;padding:6px 10px;z-index:999;display:none;transition:left .25s}
#voice-bar.open{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
#voice-bar.no-sb{left:0}
.vb{background:#333;color:#ccc;border:none;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:Arial}
.vb:hover,.vb.active{background:#555;color:#fff}
#voice-status{color:#888;font-size:10px;flex:1;text-align:right}

/* CHAPTER JUMP */
#ch-jump{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #555;border-radius:8px;padding:10px 14px;z-index:2000;display:none;gap:8px;align-items:center}
#ch-jump.open{display:flex}
#ch-input{background:#333;border:1px solid #666;border-radius:4px;color:#ddd;padding:5px 8px;font-size:13px;width:80px;text-align:center}
#ch-go{background:#555;color:#ddd;border:none;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:13px}

/* SPINNER */
#spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#888;font-size:13px;display:none}

/* SCROLLBAR */
#sidebar::-webkit-scrollbar,#notes-viewer::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb,#notes-viewer::-webkit-scrollbar-thumb{background:#555;border-radius:2px}
</style>

</head>
<body>

<!-- AUTH -->

<div id="auth-screen">
  <div id="auth-icon">𐤉𐤄𐤅𐤄</div>
  <h1>THE ANCIENT COVENANT RECORD<br><span style="font-size:11px;font-weight:normal;color:#888">Enter access code to continue</span></h1>
  <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')acrAuth()">
  <button onclick="acrAuth()">Enter</button>
  <div id="auth-err">Incorrect password</div>
</div>

<!-- PROGRESS -->

<div id="prog"><div id="prog-fill"></div></div>

<!-- TOP NAV -->

<div id="topnav">
  <button class="nb" onclick="acrToggleSB()" title="Contents">☰</button>
  <div id="title-bar">THE ANCIENT COVENANT RECORD</div>
  <button class="nb" onclick="acrToggleRecent()" title="Recently read" id="btn-recent">🕐</button>
  <button class="nb" onclick="acrToggleBM()" title="Bookmarks" id="btn-bm">☆</button>
  <button class="nb" onclick="acrChJump()" title="Jump to chapter">⊕</button>
  <button class="nb" onclick="acrToggleNotes()" title="Notes" id="btn-notes">📝</button>
  <button class="nb" onclick="acrToggleNotesViewer()" title="All notes">📋</button>
  <input id="search-box" type="text" placeholder="Search…" oninput="acrSearch(this.value)">
  <button class="nb" onclick="acrFont(-1)" title="Smaller">A-</button>
  <button class="nb" onclick="acrFont(1)" title="Larger">A+</button>
  <button class="nb" onclick="acrSpacing(-1)" title="Less spacing">↕-</button>
  <button class="nb" onclick="acrSpacing(1)" title="More spacing">↕+</button>
  <button class="nb" onclick="acrSepia()" title="Sepia mode" id="btn-sepia">☀</button>
  <button class="nb" onclick="acrDark()" title="Dark mode" id="btn-dark">◑</button>
  <button class="nb" onclick="acrRead()" title="Reading mode" id="btn-read">⊡</button>
  <button class="nb" onclick="acrToggleVoice()" title="Voice reading" id="btn-voice">🔊</button>
</div>

<!-- SIDEBAR TOC -->

<div id="sidebar"></div>

<!-- MAIN CONTENT -->

<div id="main"><div id="content"><div id="spinner">Loading…</div></div></div>

<!-- CHAPTER JUMP -->

<div id="ch-jump">
  <span style="color:#aaa;font-size:12px">Ch</span>
  <input id="ch-input" type="number" min="1" placeholder="№" onkeydown="if(event.key==='Enter')doChJump()">
  <button id="ch-go" onclick="doChJump()">Go</button>
  <button class="nb" onclick="document.getElementById('ch-jump').classList.remove('open')" style="color:#888">✕</button>
</div>

<!-- BOTTOM NAV -->

<div id="botnav">
  <button class="bnav-btn" id="btn-prev" onclick="acrNav(-1)">◀ Prev</button>
  <span id="pos-lbl">— of 111</span>
  <button class="bnav-btn" id="btn-next" onclick="acrNav(1)">Next ▶</button>
</div>

<!-- RECENTLY READ PANEL -->

<div id="recent-panel"></div>

<!-- BOOKMARKS PANEL -->

<div id="bm-panel"></div>

<!-- VOICE BAR -->

<div id="voice-bar">
  <button class="vb" id="vb-play" onclick="voicePlay()">▶ Play</button>
  <button class="vb" onclick="voicePause()">⏸</button>
  <button class="vb" onclick="voiceStop()">⏹</button>
  <select id="vb-speed" class="vb" onchange="voiceSetSpeed(this.value)" style="padding:3px">
    <option value="0.7">0.7×</option>
    <option value="0.85">0.85×</option>
    <option value="1" selected>1×</option>
    <option value="1.2">1.2×</option>
    <option value="1.5">1.5×</option>
  </select>
  <select id="vb-voice" class="vb" onchange="voiceSetVoice(this.value)" style="max-width:130px;padding:3px"></select>
  <button class="vb" onclick="voicePreview()">Preview</button>
  <select id="vb-mode" class="vb" onchange="voiceMode=this.value" style="padding:3px">
    <option value="verses">Verses</option>
    <option value="notes">Notes</option>
    <option value="all">All</option>
  </select>
  <label style="color:#888;font-size:10px;display:flex;align-items:center;gap:3px">
    <input type="checkbox" id="vb-auto" style="width:12px"> Auto-next
  </label>
  <div id="voice-status">—</div>
</div>

<!-- NOTES PANEL -->

<div id="notes-panel">
  <div id="notes-header">
    <span>Section Notes</span>
    <button class="nb" onclick="acrToggleNotes()" style="font-size:11px">✕ Close</button>
  </div>
  <textarea id="notes-ta" placeholder="Type notes here… auto-saved per section"></textarea>
</div>

<!-- NOTES VIEWER -->

<div id="notes-viewer">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="color:#aaa;font-size:12px;font-weight:bold">ALL NOTES</span>
    <button class="nb" onclick="acrToggleNotesViewer()" style="font-size:11px">✕ Close</button>
  </div>
  <div id="notes-viewer-list"></div>
</div>

<!-- HIGHLIGHT POPUP -->

<div id="hl-popup">
  <button class="hl-btn" style="background:#ffeb3b" onclick="applyHL('hl-y')" title="Yellow"></button>
  <button class="hl-btn" style="background:#90EE90" onclick="applyHL('hl-g')" title="Green"></button>
  <button class="hl-btn" style="background:#87CEEB" onclick="applyHL('hl-b')" title="Blue"></button>
  <button class="hl-btn" style="background:#DDA0DD" onclick="applyHL('hl-p')" title="Purple"></button>
  <button class="hl-btn" style="background:#FFB347" onclick="applyHL('hl-o')" title="Orange"></button>
  <button class="hl-rm" onclick="removeHL()">✕</button>
  <button class="hl-rm" onclick="copySelection()">Copy</button>
  <button class="nb" onclick="hideHLPopup()" style="font-size:10px;color:#666">close</button>
</div>

<!-- SCROLL TOP -->

<button id="top-btn" onclick="window.scrollTo(0,0)" title="Scroll to top">↑</button>

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function acrAuth() {
  var pw = document.getElementById('pw-input').value;
  // Simple hash check - works in all browsers, no async, no HTTPS requirement
  var ok = (simpleHash(pw) === 547885903);
  if(ok) {
    sessionStorage.setItem('acr_auth','1');
    document.getElementById('auth-screen').style.display='none';
    acrInit();
  } else {
    var err=document.getElementById('auth-err');
    err.style.display='block';
    err.textContent='Incorrect password';
    document.getElementById('pw-input').value='';
    setTimeout(function(){err.style.display='none';},2000);
  }
}
function simpleHash(s) {
  // djb2 hash of 'Pr@y3r*' = computed below
  var h = 5381;
  for(var i=0;i<s.length;i++) h = ((h<<5)+h)+s.charCodeAt(i);
  return h >>> 0;
}

}

// ─── SECTION LOADING ──────────────────────────────────────────────────────────
function loadSection(idx, resumeScroll) {
  if(idx<0||idx>=NAV_IDS.length) return;
  ACR.curIdx = idx;
  localStorage.setItem('acr_last', idx);
  addRecent(idx);
  
  // Save notes from previous section
  saveNotes();
  
  var fid = NAV_IDS[idx];
  var label = NAV_LABELS[idx];
  
  document.getElementById('title-bar').textContent = label;
  document.getElementById('pos-lbl').textContent = (idx+1)+' of '+NAV_IDS.length;
  document.getElementById('btn-prev').className = 'bnav-btn'+(idx===0?' off':'');
  document.getElementById('btn-next').className = 'bnav-btn'+(idx===NAV_IDS.length-1?' off':'');
  
  // Mark active in TOC
  document.querySelectorAll('.toc-file').forEach(function(el){
    el.classList.toggle('active', el.dataset.idx===String(idx));
  });
  
  // Show spinner
  document.getElementById('content').innerHTML = '<div style="padding:40px;color:#888;text-align:center">Loading…</div>';
  
  // Load bookmark star
  var bms = JSON.parse(localStorage.getItem('acr_bms')||'[]');
  document.getElementById('btn-bm').textContent = bms.indexOf(fid)>=0?'★':'☆';
  
  // Load notes
  var notes = JSON.parse(localStorage.getItem('acr_notes')||'{}');
  document.getElementById('notes-ta').value = notes[fid]||'';
  
  // Fetch JSON
  fetch('data/'+fid+'.json')
    .then(function(r){return r.json();})
    .then(function(d){
      document.getElementById('content').innerHTML = d.html||d.content||'';
      applyFS(); applyLH();
      restoreHighlights(fid);
      
      // Restore scroll
      if(resumeScroll) {
        var pos = JSON.parse(localStorage.getItem('acr_scroll')||'{}');
        if(pos[fid]) setTimeout(function(){window.scrollTo(0,pos[fid]);},100);
      } else {
        window.scrollTo(0,0);
      }
      
      // Voice
      voiceStop();
      buildVoiceParas();
      var vpos = JSON.parse(localStorage.getItem('acr_vpos')||'{}');
      ACR.voicePos = vpos[fid]||0;
      updateVoiceStatus();
    })
    .catch(function(){
      document.getElementById('content').innerHTML='<p style="padding:20px;color:#888">Error loading section.</p>';
    });
}

// ─── TOC ──────────────────────────────────────────────────────────────────────
function buildTOC() {
  var sb = document.getElementById('sidebar');
  var html = '<div style="padding:6px 12px 4px;color:#555;font-size:8px;letter-spacing:.06em;border-bottom:1px solid #333">📖 THE ANCIENT COVENANT RECORD</div>';
  
  for(var i=0;i<TOC.length;i++) {
    var e = TOC[i];
    if(e.type==='section') {
      html += '<div class="toc-sec">'+e.label+'</div>';
    } else if(e.type==='vol') {
      html += '<div class="toc-vol">'+e.label+'</div>';
    } else if(e.type==='file') {
      html += '<div class="toc-file" data-idx="'+e.idx+'" onclick="loadSection('+e.idx+',true)">'+e.label+'</div>';
    }
  }
  sb.innerHTML = html;
  
  if(!ACR.sbOpen) document.getElementById('sidebar').classList.add('hidden');
}

  document.getElementById('prog-fill').style.width = (h>0?Math.round(s/h*100):0)+'%';

    pos[NAV_IDS[ACR.curIdx]] = s;

// ─── CHAPTER JUMP ─────────────────────────────────────────────────────────────
function acrChJump() {
  var j = document.getElementById('ch-jump');
  j.classList.toggle('open');
  if(j.classList.contains('open')) document.getElementById('ch-input').focus();
}
function doChJump() {
  var n = parseInt(document.getElementById('ch-input').value);
  if(!n) return;
  // Find paragraph with chapter number in content
  var paras = document.querySelectorAll('#content .dp');
  var found = false;
  for(var i=0;i<paras.length;i++) {
    var t = paras[i].textContent;
    // Look for chapter header containing "CHAPTER N" or "N" at start
    if(/chapter\s+{0}b/i.test(t.replace(/[^a-zA-Z0-9\s]/g,' '))) {
      // More specific
    }
    if(t.match(new RegExp('CHAPTER\\s+'+n+'\\b','i')) || 
       t.match(new RegExp('^'+n+'\\s')) ||
       t.match(new RegExp('— CHAPTER '+n+'\\b'))) {
      var top = paras[i].getBoundingClientRect().top + (window.pageYOffset||0) - 60;
      window.scrollTo(0,top);
      found = true;
      break;
    }
  }
  if(!found) {
    // Try numbered verse
    var verses = document.querySelectorAll('[data-ptype="verse"]');
    for(var j=0;j<verses.length;j++) {
      var vt = verses[j].textContent.trim();
      if(vt.match(new RegExp('^'+n+'\\s'))) {
        var top2 = verses[j].getBoundingClientRect().top + (window.pageYOffset||0) - 60;
        window.scrollTo(0,top2);
        found = true; break;
      }
    }
  }
  document.getElementById('ch-input').value='';
  document.getElementById('ch-jump').classList.remove('open');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function acrSearch(q) {
  document.querySelectorAll('mark').forEach(function(m){m.outerHTML=m.innerHTML;});
  if(!q||q.length<2) return;
  var c=document.getElementById('content'), ql=q.toLowerCase();
  var walker=document.createTreeWalker(c,NodeFilter.SHOW_TEXT,null,false);
  var nodes=[],nd;
  while(nd=walker.nextNode()) nodes.push(nd);
  var first=null;
  for(var i=0;i<nodes.length;i++) {
    var t=nodes[i].textContent, idx=t.toLowerCase().indexOf(ql);
    if(idx>=0) {
      var r=document.createRange();
      r.setStart(nodes[i],idx); r.setEnd(nodes[i],idx+q.length);
      try{var m=document.createElement('mark');r.surroundContents(m);if(!first)first=m;}catch(e){}
    }
  }
  if(first) window.scrollTo(0,first.getBoundingClientRect().top+(window.pageYOffset||0)-80);
}

  var r = JSON.parse(localStorage.getItem('acr_recent')||'[]');
  r = r.filter(function(i){return i!==idx;});
  r.unshift(idx);
  if(r.length>10) r=r.slice(0,10);
  localStorage.setItem('acr_recent',JSON.stringify(r));
}
function acrToggleRecent() {
  var p = document.getElementById('recent-panel');
  if(p.classList.toggle('open')) {
    var r = JSON.parse(localStorage.getItem('acr_recent')||'[]');
    p.innerHTML = r.length?r.map(function(idx){
      var lbl = NAV_LABELS[idx]?NAV_LABELS[idx].split(' — ').slice(0,2).join(' — '):'?';
      return '<div class="rp-item" onclick="loadSection('+idx+',true);document.getElementById('recent-panel').classList.remove('open')">'+lbl+'</div>';
    }).join(''):'<span style="color:#888;font-size:11px">No history yet</span>';
  }
}

// ─── NOTES ────────────────────────────────────────────────────────────────────
function saveNotes() {
  var fid = NAV_IDS[ACR.curIdx];
  var val = document.getElementById('notes-ta').value;
  var notes = JSON.parse(localStorage.getItem('acr_notes')||'{}');
  if(val) notes[fid]=val; else delete notes[fid];
  localStorage.setItem('acr_notes',JSON.stringify(notes));
}
function acrToggleNotes() {
  var p = document.getElementById('notes-panel');
  ACR.notesOpen = p.classList.toggle('open');
  document.getElementById('btn-notes').classList.toggle('active',ACR.notesOpen);
  if(ACR.notesOpen) document.getElementById('notes-ta').focus();
}
function acrToggleNotesViewer() {
  var p = document.getElementById('notes-viewer');
  ACR.nvOpen = !ACR.nvOpen;
  p.classList.toggle('open',ACR.nvOpen);
  if(ACR.nvOpen) renderNotesViewer();
}
function renderNotesViewer() {
  var notes = JSON.parse(localStorage.getItem('acr_notes')||'{}');
  var list = document.getElementById('notes-viewer-list');
  var keys = Object.keys(notes);
  if(!keys.length){ list.innerHTML='<p style="color:#888;font-size:12px">No notes yet.</p>'; return; }
  list.innerHTML = keys.map(function(fid){
    var idx = NAV_IDS.indexOf(fid);
    var lbl = idx>=0?NAV_LABELS[idx]:'Unknown';
    return '<div class="nv-entry" onclick="loadSection('+idx+',true);acrToggleNotesViewer()">'+
      '<div class="nv-title">'+lbl+'</div>'+
      '<div class="nv-text">'+notes[fid].substring(0,200)+(notes[fid].length>200?'…':'')+'</div>'+
      '</div>';
  }).join('');
}

// ─── HIGHLIGHTING ─────────────────────────────────────────────────────────────
var selRange = null;
function onSelection() {
  var sel = window.getSelection();
  if(!sel||sel.isCollapsed||!sel.toString().trim()) { hideHLPopup(); return; }
  selRange = sel.getRangeAt(0).cloneRange();
  var rect = sel.getRangeAt(0).getBoundingClientRect();
  var pop = document.getElementById('hl-popup');
  pop.style.top = (rect.bottom+window.pageYOffset+6)+'px';
  pop.style.left = Math.max(4,Math.min(window.innerWidth-200,rect.left+window.pageXOffset))+'px';
  pop.classList.add('show');
}
function hideHLPopup() {
  document.getElementById('hl-popup').classList.remove('show');
  selRange = null;
}
function applyHL(cls) {
  if(!selRange) return;
  try {
    var span = document.createElement('span');
    span.className = cls;
    selRange.surroundContents(span);
    saveHighlights();
  } catch(e) {
    // Multi-node selection — wrap each text node
    var frag = selRange.extractContents();
    var span = document.createElement('span');
    span.className = cls;
    span.appendChild(frag);
    selRange.insertNode(span);
    saveHighlights();
  }
  hideHLPopup();
  window.getSelection().removeAllRanges();
}
function removeHL() {
  if(!selRange) return;
  var node = selRange.startContainer;
  while(node && node!==document.getElementById('content')) {
    if(node.nodeType===1 && node.className && node.className.startsWith('hl-')) {
      var parent = node.parentNode;
      while(node.firstChild) parent.insertBefore(node.firstChild,node);
      parent.removeChild(node);
      saveHighlights();
      break;
    }
    node = node.parentNode;
  }
  hideHLPopup();
}
function copySelection() {
  var sel = window.getSelection();
  if(sel && !sel.isCollapsed) {
    navigator.clipboard.writeText(sel.toString()).catch(function(){
      document.execCommand('copy');
    });
  }
  hideHLPopup();
}
function saveHighlights() {
  var fid = NAV_IDS[ACR.curIdx];
  var content = document.getElementById('content');
  var spans = content.querySelectorAll('[class^="hl-"]');
  var saved = [];
  spans.forEach(function(s){
    saved.push({text:s.textContent, cls:s.className});
  });
  ACR.hlData[fid] = saved;
  localStorage.setItem('acr_hl',JSON.stringify(ACR.hlData));
}
function restoreHighlights(fid) {
  var saved = ACR.hlData[fid];
  if(!saved||!saved.length) return;
  var content = document.getElementById('content');
  saved.forEach(function(h){
    if(!h.text||!h.cls) return;
    var walker = document.createTreeWalker(content,NodeFilter.SHOW_TEXT,null,false);
    var nd;
    while(nd=walker.nextNode()) {
      var idx = nd.textContent.indexOf(h.text);
      if(idx>=0) {
        try {
          var r = document.createRange();
          r.setStart(nd,idx); r.setEnd(nd,idx+h.text.length);
          var sp = document.createElement('span');
          sp.className = h.cls;
          r.surroundContents(sp);
        } catch(e) {}
        break;
      }
    }
  });
}

// ─── VOICE READING ────────────────────────────────────────────────────────────
function loadVoices() {
  function doLoad() {
    ACR.voices = ACR.synth.getVoices();
    var sel = document.getElementById('vb-voice');
    sel.innerHTML = ACR.voices.map(function(v,i){
      var star = (v.name.includes('Enhanced')||v.name.includes('Neural')||v.name.includes('Premium'))?'*':'';
      return '<option value="'+i+'"'+(i===ACR.voiceIdx?' selected':'')+'>'+(star?'★ ':'')+v.name.substring(0,28)+'</option>';
    }).join('');
  }
  if(ACR.synth.getVoices().length) doLoad();
  else ACR.synth.onvoiceschanged = doLoad;
}
function acrToggleVoice() {
  ACR.voiceOpen = !ACR.voiceOpen;
  document.getElementById('voice-bar').classList.toggle('open',ACR.voiceOpen);
  document.getElementById('btn-voice').classList.toggle('active',ACR.voiceOpen);
  var noSb = !ACR.sbOpen||window.innerWidth<=700||ACR.reading;
  document.getElementById('voice-bar').classList.toggle('no-sb',noSb);
  document.getElementById('botnav').style.bottom = ACR.voiceOpen?'42px':'0';
}
function buildVoiceParas() {
  var mode = voiceMode||'verses';
  var sel = mode==='verses'?'[data-ptype="verse"]':
            mode==='notes'?'[data-ptype="note"]':
            '[data-ptype]';
  ACR.voiceParas = Array.from(document.querySelectorAll('#content '+sel));
}
function pronounce(text) {
  return text
    .replace(/𐤉𐤄𐤅𐤄/g,'')
    .replace(/[𐤀-𐤟]+/g,'')
    .replace(/\bYHWH\b/g,'Yahweh')
    .replace(/\bYH\b/g,'Yah')
    .replace(/\bMosheh\b/gi,'Mo-sheh')
    .replace(/\bYehoshua\b/gi,'Yeh-ho-shua')
    .replace(/\bChanokh\b/gi,'Hha-nokh')
    .replace(/\bQumran\b/gi,'Koom-rahn')
    .replace(/\bOrit\b/gi,'Oh-reet')
    .replace(/\bGeez\b/gi,'Geh-ez')
    .replace(/Ge’ez/gi,"Geh-ez").replace(/Ge'ez/gi,"Geh-ez").replace(/Geez/gi,"Geh-ez")
    .replace(/\bDSS\b/g,'Dead Sea Scrolls')
    .replace(/\[DSS\]/g,'Dead Sea Scrolls note:')
    .replace(/ORIT GE.EZ/gi,"Orit Gezz note:")
    .replace(/\[MASORETIC VARIANT\]/gi,'Masoretic variant note:')
    .replace(/\[CRITICAL NOTE\]/gi,'Critical note:')
    
    .replace(/[^\x00-\xFF\u0100-\u024F]/g,'');
}
function voicePlay() {
  if(ACR.voicePlaying) return;
  buildVoiceParas();
  if(!ACR.voiceParas.length) return;
  ACR.voicePlaying = true;
  document.getElementById('vb-play').textContent='▶ Playing';
  voiceReadNext();
}
function voiceReadNext() {
  if(!ACR.voicePlaying||ACR.voicePos>=ACR.voiceParas.length) {
    if(ACR.voicePlaying && document.getElementById('vb-auto').checked) {
      voiceStop();
      setTimeout(function(){acrNav(1);setTimeout(function(){buildVoiceParas();ACR.voicePos=0;voicePlay();},800);},400);
    } else {
      voiceStop();
    }
    return;
  }
  var para = ACR.voiceParas[ACR.voicePos];
  var text = pronounce(para.textContent||'');
  if(!text.trim()){ ACR.voicePos++; voiceReadNext(); return; }
  
  // Scroll to paragraph
  var top = para.getBoundingClientRect().top+(window.pageYOffset||0)-80;
  window.scrollTo(0,top);
  para.style.background='rgba(255,235,59,.15)';
  
  // Save position
  var vpos = JSON.parse(localStorage.getItem('acr_vpos')||'{}');
  vpos[NAV_IDS[ACR.curIdx]] = ACR.voicePos;
  localStorage.setItem('acr_vpos',JSON.stringify(vpos));
  
  updateVoiceStatus();
  
  var utt = new SpeechSynthesisUtterance(text);
  if(ACR.voices[ACR.voiceIdx]) utt.voice = ACR.voices[ACR.voiceIdx];
  utt.rate = ACR.voiceRate;
  utt.onend = function() {
    if(para) para.style.background='';
    ACR.voicePos++;
    voiceReadNext();
  };
  utt.onerror = function() {
    if(para) para.style.background='';
    ACR.voicePos++;
    voiceReadNext();
  };
  ACR.synth.speak(utt);
}
function voicePause() {
  if(ACR.synth.speaking) ACR.synth.pause();
  ACR.voicePlaying = false;
  document.getElementById('vb-play').textContent='▶ Play';
}
function voiceStop() {
  ACR.synth.cancel();
  ACR.voicePlaying = false;
  document.getElementById('vb-play').textContent='▶ Play';
  // Clear highlight
  document.querySelectorAll('#content [data-ptype]').forEach(function(p){p.style.background='';});
}
function voiceSetSpeed(v) {
  ACR.voiceRate = parseFloat(v);
  localStorage.setItem('acr_vrate',ACR.voiceRate);
}
function voiceSetVoice(i) {
  ACR.voiceIdx = parseInt(i);
  localStorage.setItem('acr_voice',ACR.voiceIdx);
}
function voicePreview() {
  ACR.synth.cancel();
  var utt = new SpeechSynthesisUtterance(pronounce('In the beginning, The Creator created the heavens and the earth.'));
  if(ACR.voices[ACR.voiceIdx]) utt.voice = ACR.voices[ACR.voiceIdx];
  utt.rate = ACR.voiceRate;
  ACR.synth.speak(utt);
}
function updateVoiceStatus() {
  var fid = NAV_IDS[ACR.curIdx];
  var vpos = JSON.parse(localStorage.getItem('acr_vpos')||'{}');
  var saved = vpos[fid];
  var total = ACR.voiceParas.length;
  var cur = ACR.voicePos+1;
  var txt = cur+'/'+total;
  if(saved&&!ACR.voicePlaying) txt='Resume v'+saved;
  document.getElementById('voice-status').textContent=txt;
}

// Close panels on outside click
document.addEventListener('click',function(e){
  if(!e.target.closest('#hl-popup')&&!e.target.closest('#content')) hideHLPopup();
  if(!e.target.closest('#recent-panel')&&!e.target.closest('#btn-recent')) {
    document.getElementById('recent-panel').classList.remove('open');
  }
  if(!e.target.closest('#bm-panel')&&!e.target.closest('#btn-bm')&&!e.target.closest('#content')) {
    // keep bm panel if user just clicked bm button - handled in toggle
  }
  if(!e.target.closest('#ch-jump')&&!e.target.closest('.nb[onclick*="acrChJump"]')) {
    document.getElementById('ch-jump').classList.remove('open');
  }
});

// Service worker
if('serviceWorker' in navigator) {
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
