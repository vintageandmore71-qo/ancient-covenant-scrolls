name: Repo File Worker - Dry Run

on:
  push:
    paths:
      - 'loadtasks-inbox/repo-file-job.json'
      - '.github/workflows/load-repo-file-worker-dry-run.yml'
  workflow_dispatch:
    inputs:
      job_file:
        description: 'Path to job file'
        required: false
        default: 'loadtasks-inbox/repo-file-job.json'

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry Run - Read, Validate, Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and report
        id: analysis
        run: |
          python3 << 'PYEOF'
          import json, os, sys, subprocess

          JOB_FILE = os.environ.get('JOB_FILE', 'loadtasks-inbox/repo-file-job.json')

          if not os.path.isfile(JOB_FILE):
              print('ERROR: Job file not found: ' + JOB_FILE)
              sys.exit(1)

          with open(JOB_FILE) as fh:
              try:
                  job = json.load(fh)
              except json.JSONDecodeError as e:
                  print('ERROR: Invalid JSON: ' + str(e))
                  sys.exit(1)

          REQUIRED = [
              'targetSite', 'targetFiles', 'fileAction', 'riskLevel',
              'rollbackPlan', 'proposedChangeSummary', 'acceptanceCriteria'
          ]
          missing = [f for f in REQUIRED if not str(job.get(f, '')).strip()]
          if missing:
              print('VALIDATION FAIL - Missing: ' + ', '.join(missing))
              sys.exit(1)
          print('VALIDATION PASS')

          HIGH_PATTERNS = [
              'sw.js', 'service-worker', 'ai-chat-studio', 'image-prompt',
              'lib-load-image-providers', 'provider', 'audio', 'animation',
              'export-pack', 'deploy', 'security', 'token', 'secret',
              'credential', 'cloudflare', '.github/workflows', 'acr.css',
              'content/', 'load/sw'
          ]
          MED_PATTERNS = [
              'load.js', 'load/load', 'loadstudio', 'loadplay', 'attain',
              'study', 'acr', 'index.html', 'lib-'
          ]

          target_files_raw = str(job.get('targetFiles', ''))
          pl = target_files_raw.lower()

          if any(p.lower() in pl for p in HIGH_PATTERNS):
              auto_risk = 'HIGH'
          elif any(p.lower() in pl for p in MED_PATTERNS):
              auto_risk = 'MEDIUM'
          else:
              auto_risk = 'LOW'

          declared_risk = str(job.get('riskLevel', 'UNKNOWN'))
          if auto_risk == declared_risk:
              risk_note = 'MATCH'
          else:
              risk_note = 'MISMATCH (declared=' + declared_risk + ', auto=' + auto_risk + ')'

          raw = target_files_raw.replace(',', '\n')
          file_paths = [f.strip() for f in raw.splitlines() if f.strip()]

          file_results = []
          all_found = True
          for fp in file_paths:
              r = subprocess.run(
                  ['git', 'ls-files', '--error-unmatch', fp],
                  capture_output=True, text=True
              )
              if r.returncode == 0:
                  file_results.append('  - ' + fp + ' -> EXISTS')
              else:
                  file_results.append('  - ' + fp + ' -> NOT FOUND IN REPO')
                  all_found = False

          if not file_paths:
              file_results = ['  (no file paths parsed)']

          if auto_risk == 'HIGH':
              verdict = 'NEEDS REVIEW - HIGH risk file(s) detected'
          elif not all_found:
              verdict = 'NEEDS REVIEW - one or more target files not found'
          elif auto_risk == 'MEDIUM':
              verdict = 'NEEDS REVIEW - MEDIUM risk, verify before proceeding'
          else:
              verdict = 'SAFE TO PROCEED - LOW risk, all files found'

          job_id = str(job.get('jobId', job.get('id', 'UNKNOWN')))

          report = '=== DRY RUN REPORT ===\n'
          report += 'Job ID:           ' + job_id + '\n'
          report += 'Target Site:      ' + str(job.get('targetSite', 'UNKNOWN')) + '\n'
          report += 'File Action:      ' + str(job.get('fileAction', 'UNKNOWN')) + '\n'
          report += 'Risk (declared):  ' + declared_risk + '\n'
          report += 'Risk (auto):      ' + auto_risk + '\n'
          report += 'Risk check:       ' + risk_note + '\n'
          report += '\n'
          report += 'Target Files:\n'
          for fr in file_results:
              report += fr + '\n'
          report += '\n'
          report += 'Field Validation: PASS\n'
          report += '\n'
          report += 'Patch Plan Summary:\n'
          report += str(job.get('proposedChangeSummary', '(none)')) + '\n'
          report += '\n'
          report += 'Acceptance Criteria:\n'
          report += str(job.get('acceptanceCriteria', '(none)')) + '\n'
          report += '\n'
          report += 'PR Draft Title:\n'
          report += str(job.get('prTitleSuggestion', '(not specified)')) + '\n'
          report += '\n'
          report += 'Branch Suggestion:\n'
          report += str(job.get('branchNameSuggestion', '(not specified)')) + '\n'
          report += '\n'
          report += 'Rollback Plan:\n'
          report += str(job.get('rollbackPlan', '(not specified)')) + '\n'
          report += '\n'
          report += 'Impact Flags:\n'
          report += '  Live site impact:       ' + str(job.get('liveSiteImpact', 'Unknown')) + '\n'
          report += '  Service worker impact:  ' + str(job.get('serviceWorkerImpact', 'Unknown')) + '\n'
          report += '  AI provider impact:     ' + str(job.get('aiProviderImpact', 'Unknown')) + '\n'
          report += '  Security impact:        ' + str(job.get('securityImpact', 'Unknown')) + '\n'
          report += '\n'
          report += 'Verdict: ' + verdict + '\n'
          report += '\n'
          report += '=== DRY RUN COMPLETE - NO FILES WERE MODIFIED ===\n'

          report_filename = 'dry-run-report-' + job_id + '.txt'
          with open(report_filename, 'w') as fh:
              fh.write(report)

          print(report)
          print('Report written: ' + report_filename)

          github_env = os.environ.get('GITHUB_ENV', '')
          if github_env:
              with open(github_env, 'a') as fh:
                  fh.write('REPORT_FILE=' + report_filename + '\n')
                  fh.write('JOB_ID=' + job_id + '\n')
          PYEOF
        env:
          JOB_FILE: ${{ inputs.job_file || 'loadtasks-inbox/repo-file-job.json' }}

      - name: Upload dry-run report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dry-run-report-${{ env.JOB_ID || 'unknown' }}
          path: ${{ env.REPORT_FILE || 'dry-run-report-*.txt' }}
          retention-days: 30
          if-no-files-found: warn
